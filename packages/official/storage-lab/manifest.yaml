schema_version: 1
id: official/storage-lab
version: 0.1.0
display_name: Official Storage Lab
description: Package-scoped storage/data contract preview — storage backend classes, package state store planning, document CRUD preview, snapshot export, and blob/asset store contract proof. Deterministic, no real DB, no SQL, no filesystem, no network, no blob content in events. Ordinary package capability with no privileged platform access.
