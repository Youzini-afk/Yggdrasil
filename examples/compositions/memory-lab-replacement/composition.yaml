id: example/memory-lab-replacement
version: 0.1.0
entry_surface_id: thirdparty/memory-lab/home-card
title: "Memory Lab Replacement Composition"
description: "Proves that a third-party memory-lab replacement satisfies the same surface/capability/record/retrieve/trace/update/correction/redaction/branch_view/provenance shape as official/memory-lab."
packages:
  - ../../packages/thirdparty-memory-lab/manifest.yaml
required_surfaces:
  - home_card
  - forge_panel
  - assistant_action
required_capabilities:
  - thirdparty/memory-lab/describe_memory_contract
  - thirdparty/memory-lab/record_memory
  - thirdparty/memory-lab/retrieve_memory
  - thirdparty/memory-lab/trace_retrieval
  - thirdparty/memory-lab/draft_memory_update
  - thirdparty/memory-lab/apply_memory_correction
  - thirdparty/memory-lab/draft_forget_redaction
  - thirdparty/memory-lab/branch_memory_view
  - thirdparty/memory-lab/explain_memory_provenance
permission_expectations:
  - capabilities.invoke
replacement_candidates:
  - official/memory-lab
compatibility_notes:
  - "Third-party replacement exposes equivalent surface slots to official/memory-lab"
  - "No kernel privilege or official namespace required"
  - "Official memory-lab is a replacement candidate only — no routing priority"
  - "Both packages produce package-owned shapes: memory_record, retrieval_trace, update_draft, correction, redaction_plan, branch_view, provenance"
  - "Neither package may directly mutate trusted state or perform network/inference"
  - "Memory packages are ordinary packages with no special kernel memory access"
