  #   max_frame_bytes: 65536
  #   max_total_bytes_inbound: 10485760
  #   max_total_bytes_outbound: 10485760
  #   max_concurrent_connections: 8

autoload:
  - ../packages/official/playable-creation-board/manifest.yaml
