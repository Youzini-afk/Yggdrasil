      $schema: https://json-schema.org/draft/2020-12/schema
      description: |-
        Response returned by an outbound executor.

        Like the request, this is content-free. It carries status, the *shape* of headers/body, usage/cost placeholders, and metadata identifying what kind of executor produced the response.
      properties:
        body_shape:
          default: null
          description: JSON *shape* of the response body.
        cost:
          default: null
          description: 'Cost placeholder (e.g. `{"total_cost_usd": 0.002}`).'
        executor_kind:
          allOf:
          - $ref: '#/components/schemas/ExecutorKind'
          description: What kind of executor produced this response.
        headers_shape:
          default: null
          description: 'JSON *shape* of the response headers (e.g. `{"content-type": "application/json", "x-ratelimit-remaining": "..."}`).'
        network_performed:
          description: Whether real network I/O was performed.
          type: boolean
        provider_request_id:
          default: null
          description: Provider-assigned request id (e.g. `req-abc123`).
