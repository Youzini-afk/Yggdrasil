  surfaces:
    - id: official/playable-creation-board/entry
      slot: experience_entry
      title: Playable Creation Board
      description: Launch a playable creation board with board/module/constraint/marker state.
      capability_id: official/playable-creation-board/launch
      activation:
        launch_capability_id: official/playable-creation-board/launch
        session_template:
          labels: [playable-creation-board, beta-1]
      approval_policy: none
    - id: official/playable-creation-board/play-renderer
      slot: play_renderer
      title: Playable Creation Board Renderer
      description: Protocol-visible render payload for the playable creation board.
      capability_id: official/playable-creation-board/render_payload
    - id: official/playable-creation-board/forge-panel
      slot: forge_panel
      title: Playable Creation Board Inspector
      description: Inspect board state, modules, constraints, markers, checkpoints, recovery plans, and agent-run bindings.
      capability_id: official/playable-creation-board/describe_contract
    - id: official/playable-creation-board/assistant-action
      slot: assistant_action
      title: Request Board Change
      description: Draft a user-approved change proposal for the playable creation board via Agentic Forge binding.
      capability_id: official/playable-creation-board/request_change
      approval_policy: fork_then_approve
