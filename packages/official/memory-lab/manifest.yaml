contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/memory-lab/forge-panel
      slot: forge_panel
      title: Memory Lab Inspector
      description: Inspect package-owned memory records, retrieval traces, update drafts, corrections, redaction plans, branch views, and provenance.
      capability_id: official/memory-lab/describe_memory_contract
    - id: official/memory-lab/assistant-action
      slot: assistant_action
      title: Draft Memory Change
      description: Draft approval-gated memory updates, corrections, or forget/redaction plans.
      capability_id: official/memory-lab/draft_memory_update
      approval_policy: user_approval
    - id: official/memory-lab/home-card
      slot: home_card
      title: Memory Lab
      description: Package-owned memory record and retrieval without kernel memory or privileged access.
      capability_id: official/memory-lab/record_memory
permissions:
