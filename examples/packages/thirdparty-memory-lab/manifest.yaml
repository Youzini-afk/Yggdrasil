schema_version: 1
id: thirdparty/memory-lab
version: 0.1.0
display_name: Community Memory Lab
description: "Third-party memory package proving official/memory-lab is replaceable: package-owned memory record, retrieval trace, proposal-gated update, correction, forget/redaction, branch-aware view, and provenance — all deterministic, no network, no inference, no kernel privilege."
