schema_version: 1
id: official/pi-agent-runtime-lab
version: 0.1.0
display_name: Official PI Agent Runtime Lab
description: Reference agent runtime package that produces deterministic run plans, trace summaries, proposal drafts, and echo payloads without real model inference or network access.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/pi-agent-runtime-lab/run
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: true
    side_effects: []
  - id: official/pi-agent-runtime-lab/explain_run
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/pi-agent-runtime-lab/draft_proposal
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/pi-agent-runtime-lab/summarize_trace
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/pi-agent-runtime-lab/echo
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/pi-agent-runtime-lab/assistant-action
      slot: assistant_action
      title: PI Agent Runtime Assistant
      description: Draft approval-gated agent run proposals for play-creation workflows.
      capability_id: official/pi-agent-runtime-lab/draft_proposal
      approval_policy: fork_then_approve
    - id: official/pi-agent-runtime-lab/forge-panel
      slot: forge_panel
      title: PI Agent Runtime Inspector
      description: Inspect agent run plans, trace summaries, and proposal drafts without privileged access.
      capability_id: official/pi-agent-runtime-lab/explain_run
    - id: official/pi-agent-runtime-lab/home-card
      slot: home_card
      title: PI Agent Runtime
      description: Launch deterministic agent run plans without real inference or network.
      capability_id: official/pi-agent-runtime-lab/run
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
