schema_version: 1
id: example/echo-remote
version: 0.1.0
display_name: Echo Remote Preview Example
description: Manifest-only preview for the remote entry form.
entry:
  kind: remote
  endpoint: https://example.invalid/ygg/echo
  auth:
    scheme: none
    config: null
provides:
  - id: example/echo-remote/echo
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
permissions:
  events:
    read: false
    append: false
  capabilities:
    invoke: []
  packages:
    call: []
  assets:
    read: false
    write: false
  network:
    hosts:
      - example.invalid
  filesystem:
    read: []
    write: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 1000
  memory_mb: 64
  wall_clock_ms: 10000
