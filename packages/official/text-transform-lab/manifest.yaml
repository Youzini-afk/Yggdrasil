schema_version: 1
id: official/text-transform-lab
version: 0.1.0
display_name: Official Text Transform Lab
description: Generic deterministic text transform rule import, validation, preview, pipeline explanation, and compatibility diagnostics.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/text-transform-lab/import_rules
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/text-transform-lab/validate_rules
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/text-transform-lab/apply_preview
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/text-transform-lab/explain_pipeline
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/text-transform-lab/compat_report
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/text-transform-lab/home-card
      slot: home_card
      title: Text Transform Lab
      description: Import, validate, preview, and explain deterministic text transform pipelines.
      capability_id: official/text-transform-lab/apply_preview
    - id: official/text-transform-lab/forge-panel
      slot: forge_panel
      title: Text Transform Pipeline Inspector
      description: Inspect transform rules, traces, compatibility diagnostics, and unsafe rule warnings.
      capability_id: official/text-transform-lab/explain_pipeline
    - id: official/text-transform-lab/assistant-action
      slot: assistant_action
      title: Draft Text Transform Plan
      description: Prepare an approval-gated text transformation plan.
      capability_id: official/text-transform-lab/apply_preview
      approval_policy: user_approval
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
