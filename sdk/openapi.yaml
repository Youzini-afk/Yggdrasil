components:
  schemas:
    AppendEventRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        kind:
          type: string
        metadata: true
        payload: true
        session_id:
          type: string
        writer_package_id:
          type: string
      required:
      - kind
      - metadata
      - payload
      - session_id
      - writer_package_id
      title: AppendEventRequest
      type: object
    ArtifactDescriptor:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        annotations:
          additionalProperties: true
          default: {}
          type: object
        artifact_type_uri:
          type: string
        digest:
          type: string
        media_type:
          type: string
        references:
          default: []
          items:
            type: string
          type: array
        size_bytes:
          format: uint64
          minimum: 0.0
          type: integer
      required:
      - artifact_type_uri
      - digest
      - media_type
      - size_bytes
      title: ArtifactDescriptor
      type: object
    AssetGetParams:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        asset_id:
          type: string
      required:
      - asset_id
      title: AssetGetParams
      type: object
    AssetGetResponse:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        content:
          type: string
        record:
          $ref: '#/components/schemas/AssetRecord'
      required:
      - content
      - record
      title: AssetGetResponse
      type: object
    AssetListResult:
      items:
        $schema: https://json-schema.org/draft/2020-12/schema
        properties:
          created_at:
            format: date-time
            type: string
          descriptor:
            anyOf:
            - $ref: '#/components/schemas/ArtifactDescriptor'
            - type: 'null'
          hash:
            type: string
          id:
            type: string
          metadata:
            default: null
          mime:
            type: string
          origin_package_id:
            type: string
          size_bytes:
            format: uint64
            minimum: 0.0
            type: integer
        required:
        - created_at
        - hash
        - id
        - mime
        - origin_package_id
        - size_bytes
        title: AssetRecord
        type: object
      type: array
    AssetPermissions:
      properties:
        read:
          default: false
          type: boolean
        write:
          default: false
          type: boolean
      type: object
    AssetPutRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        content:
          type: string
        metadata:
          default: null
        mime:
          type: string
        origin_package_id:
          default: null
          type:
          - string
          - 'null'
      required:
      - content
      - mime
      title: AssetPutRequest
      type: object
    AssetRecord:
      properties:
        created_at:
          format: date-time
          type: string
        descriptor:
          anyOf:
          - $ref: '#/components/schemas/ArtifactDescriptor'
          - type: 'null'
        hash:
          type: string
        id:
          type: string
        metadata:
          default: null
        mime:
          type: string
        origin_package_id:
          type: string
        size_bytes:
          format: uint64
          minimum: 0.0
          type: integer
      required:
      - created_at
      - hash
      - id
      - mime
      - origin_package_id
      - size_bytes
      type: object
    AuditPackageParams:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        package_id:
          type: string
        since:
          format: date-time
          type:
          - string
          - 'null'
        until:
          format: date-time
          type:
          - string
          - 'null'
      required:
      - package_id
      title: AuditPackageParams
      type: object
    BranchRecord:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        child_session_id:
          type: string
        created_at:
          format: date-time
          type: string
        forked_from_sequence:
          format: uint64
          minimum: 0.0
          type: integer
        id:
          type: string
        metadata:
          default: null
        parent_session_id:
          type: string
      required:
      - child_session_id
      - created_at
      - forked_from_sequence
      - id
      - parent_session_id
      title: BranchRecord
      type: object
    CapAttenuateParams:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        constraints: true
        parent_handle:
          $ref: '#/components/schemas/CapHandleId'
      required:
      - constraints
      - parent_handle
      title: CapAttenuateParams
      type: object
    CapHandle:
      properties:
        cap_type:
          type: string
        cap_version:
          type: string
        constraints: true
        id:
          $ref: '#/components/schemas/CapHandleId'
        lease:
          $ref: '#/components/schemas/HandleLease'
        parent:
          anyOf:
          - $ref: '#/components/schemas/CapHandleId'
          - type: 'null'
        provenance:
          $ref: '#/components/schemas/HandleProvenance'
        revoked:
          type: boolean
        scope:
          $ref: '#/components/schemas/HandleScope'
      required:
      - cap_type
      - cap_version
      - constraints
      - id
      - lease
      - provenance
      - revoked
      - scope
      type: object
    CapHandleId:
      format: uint128
      type: string
    CapHandleResult:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        handle:
          $ref: '#/components/schemas/CapHandle'
      required:
      - handle
      title: CapHandleResult
      type: object
    CapHandlesResult:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        handles:
          items:
            $ref: '#/components/schemas/CapHandle'
          type: array
      required:
      - handles
      title: CapHandlesResult
      type: object
    CapListForParams:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        package_id:
          type: string
      required:
      - package_id
      title: CapListForParams
      type: object
    CapRevokeParams:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        handle:
          $ref: '#/components/schemas/CapHandleId'
      required:
      - handle
      title: CapRevokeParams
      type: object
    CapRevokeResult:
      type: object
    CapabilityCancelParams:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        invocation_id:
          type:
          - string
          - 'null'
        session_id:
          type:
          - string
          - 'null'
        stream_id:
          type:
          - string
          - 'null'
      title: CapabilityCancelParams
      type: object
    CapabilityDescribeResult:
      type: 'null'
    CapabilityDescriptor:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        description:
          default: null
          type:
          - string
          - 'null'
        id:
          type: string
        input_schema:
          default: null
        output_schema:
          default: null
        side_effects:
          default: []
          items:
            type: string
          type: array
        streaming:
          default: false
          type: boolean
        version:
          type: string
      required:
      - id
      - version
      title: CapabilityDescriptor
      type: object
    CapabilityDiscoverResult:
      items:
        $schema: https://json-schema.org/draft/2020-12/schema
        properties:
          descriptor:
            $ref: '#/components/schemas/CapabilityDescriptor'
          provider_behavior_digest:
            default: ''
            type: string
          provider_claim_status:
            allOf:
            - $ref: '#/components/schemas/ComponentClaimStatus'
            default: foreign_capsule
          provider_component_digest:
            default: ''
            type: string
          provider_component_id:
            default: ''
            type: string
          provider_enforced_boundaries:
            allOf:
            - $ref: '#/components/schemas/ComponentBoundaryClaims'
            default:
              filesystem_isolation: false
              network_isolation: false
              no_code_execution: false
              process_failure_isolation: false
              remote_identity: false
              resource_limits_enforced: false
              revocation_enforced: false
              tenancy_isolation: false
          provider_package_id:
            type: string
          provider_trust_class:
            allOf:
            - $ref: '#/components/schemas/ComponentTrustClass'
            default: foreign_capsule
        required:
        - descriptor
        - provider_package_id
        title: RegisteredCapability
        type: object
      type: array
    CapabilityFailedPayload:
      properties:
        receipt:
          anyOf:
          - $schema: https://json-schema.org/draft/2020-12/schema
            properties:
              annotations:
                additionalProperties: true
                default: {}
                type: object
              artifact_type_uri:
                type: string
              digest:
                type: string
              media_type:
                type: string
              references:
                default: []
                items:
                  type: string
                type: array
              size_bytes:
                format: uint64
                minimum: 0.0
                type: integer
            required:
            - artifact_type_uri
            - digest
            - media_type
            - size_bytes
            title: ArtifactDescriptor
            type: object
          - type: 'null'
          default: null
      type: object
    CapabilityInvocationRequest:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        caller_package_id:
          default: null
          type:
          - string
          - 'null'
        capability_id:
          default: null
          description: Legacy path. Runtime auto-mints a one-use transient handle when no handle is supplied.
          type:
          - string
          - 'null'
        handle:
          anyOf:
          - $ref: '#/components/schemas/CapHandleId'
          - type: 'null'
          default: null
          description: 'New preferred path: invoke by kernel-minted handle.'
        input:
          default: null
        provider_package_id:
          default: null
          type:
          - string
          - 'null'
        session_id:
          description: Kernel session id this invocation is part of, if any. Propagated from ProtocolContext for downstream scope resolution.
          type:
          - string
          - 'null'
        version:
          default: null
          type:
          - string
          - 'null'
      title: CapabilityInvocationRequest
      type: object
    CapabilityInvocationResult:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        capability_id:
          type: string
        correlation_id:
          format: uuid
          type: string
        duration_ms:
          format: uint64
          minimum: 0.0
          type: integer
        output: true
        provider_behavior_digest:
          default: ''
          type: string
        provider_component_digest:
          default: ''
          type: string
        provider_component_id:
          default: ''
          type: string
        provider_package_id:
          type: string
        provider_trust_class:
          allOf:
          - $ref: '#/components/schemas/ComponentTrustClass'
          default: foreign_capsule
        receipt:
          anyOf:
          - $ref: '#/components/schemas/ArtifactDescriptor'
          - type: 'null'
        replay_mode:
          anyOf:
          - $ref: '#/components/schemas/EffectReplayMode'
          - type: 'null'
      required:
      - capability_id
      - correlation_id
      - duration_ms
      - output
      - provider_package_id
      title: CapabilityInvocationResult
      type: object
    CapabilityInvokedPayload:
      type: object
    CapabilityPermissions:
      properties:
        invoke:
          default: []
          items:
            type: string
          type: array
      type: object
    CapabilityRequirement:
      properties:
        id:
          type: string
        version:
          type: string
      required:
      - id
      - version
      type: object
    CapabilityStreamParams:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        capability_id:
          type: string
        input: true
        provider_package_id:
          type:
          - string
          - 'null'
      required:
      - capability_id
      - input
      title: CapabilityStreamParams
      type: object
    CapabilityStreamResult:
      type: object
    ChangeCommit:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        branch_id:
          type:
          - string
          - 'null'
        change_set_id:
          type: string
        commit_type_uri:
          default: urn:yggdrasil:change-commit:v1
          type: string
        completed_at:
          format: date-time
          type: string
        error:
          type:
          - string
          - 'null'
        id:
          type: string
        idempotency_key:
          type:
          - string
          - 'null'
        operation_receipts:
          default: []
          items:
            $ref: '#/components/schemas/ArtifactDescriptor'
          type: array
        result_refs:
          default: []
          items:
            $ref: '#/components/schemas/ArtifactDescriptor'
          type: array
        started_at:
          format: date-time
          type: string
        status:
          $ref: '#/components/schemas/ChangeCommitStatus'
      required:
      - change_set_id
      - completed_at
      - id
      - started_at
      - status
      title: ChangeCommit
      type: object
    ChangeCommitStatus:
      enum:
      - committed
      - failed
      - partial
      type: string
    ChangeOperation:
      properties:
        input_refs:
          default: []
          items:
            $ref: '#/components/schemas/ArtifactDescriptor'
          type: array
        op:
          type: string
        payload:
          default: null
        target:
          type:
          - string
          - 'null'
      required:
      - op
      type: object
    ChangePrecondition:
      properties:
        expected:
          default: null
        kind:
          type: string
        target:
          type:
          - string
          - 'null'
      required:
      - kind
      type: object
    ChangeSet:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        change_set_type_uri:
          default: urn:yggdrasil:change-set:v1
          type: string
        created_at:
          format: date-time
          type: string
        expected_effects:
          default: null
        id:
          type: string
        idempotency_key:
          type:
          - string
          - 'null'
        intent_id:
          type: string
        operations:
          default: []
          items:
            $ref: '#/components/schemas/ChangeOperation'
          type: array
        preconditions:
          default: []
          items:
            $ref: '#/components/schemas/ChangePrecondition'
          type: array
        required_authority:
          default: []
          items:
            type: string
          type: array
      required:
      - created_at
      - id
      - intent_id
      title: ChangeSet
      type: object
    ComponentBoundaryClaims:
      properties:
        filesystem_isolation:
          type: boolean
        network_isolation:
          type: boolean
        no_code_execution:
          type: boolean
        process_failure_isolation:
          type: boolean
        remote_identity:
          type: boolean
        resource_limits_enforced:
          type: boolean
        revocation_enforced:
          type: boolean
        tenancy_isolation:
          type: boolean
      required:
      - filesystem_isolation
      - network_isolation
      - no_code_execution
      - process_failure_isolation
      - remote_identity
      - resource_limits_enforced
      - revocation_enforced
      - tenancy_isolation
      type: object
    ComponentClaimStatus:
      enum:
      - declared
      - legacy_adapted
      - foreign_capsule
      type: string
    ComponentDeclaration:
      properties:
        annotations:
          additionalProperties: true
          type: object
        capability_ids:
          items:
            type: string
          type: array
        content_roots:
          items:
            $ref: '#/components/schemas/ArtifactDescriptor'
          type: array
        id:
          type: string
        protocol_implementations:
          items:
            $ref: '#/components/schemas/ProtocolImplementationDeclaration'
          type: array
        surface_ids:
          items:
            type: string
          type: array
        version:
          type: string
      required:
      - id
      - version
      type: object
    ComponentDescriptor:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        annotations:
          additionalProperties: true
          type: object
        artifact:
          $ref: '#/components/schemas/ArtifactDescriptor'
        behavior:
          $ref: '#/components/schemas/ArtifactDescriptor'
        capability_ids:
          items:
            type: string
          type: array
        claim_status:
          $ref: '#/components/schemas/ComponentClaimStatus'
        component_id:
          type: string
        content_roots:
          items:
            $ref: '#/components/schemas/ArtifactDescriptor'
          type: array
        enforced_boundaries:
          $ref: '#/components/schemas/ComponentBoundaryClaims'
        entry_kind:
          type: string
        protocol_implementations:
          items:
            $ref: '#/components/schemas/PackagedProtocolDescriptor'
          type: array
        surfaces:
          items:
            $ref: '#/components/schemas/PackagedSurfaceDescriptor'
          type: array
        trust_class:
          $ref: '#/components/schemas/ComponentTrustClass'
        version:
          type: string
      required:
      - artifact
      - behavior
      - capability_ids
      - claim_status
      - component_id
      - enforced_boundaries
      - entry_kind
      - trust_class
      - version
      title: ComponentDescriptor
      type: object
    ComponentLockPin:
      properties:
        behavior_digest:
          type: string
        component_id:
          type: string
        digest:
          type: string
        trust_class:
          $ref: '#/components/schemas/ComponentTrustClass'
      required:
      - behavior_digest
      - component_id
      - digest
      - trust_class
      type: object
    ComponentTrustClass:
      enum:
      - sandboxed_component
      - isolated_process
      - remote_boundary
      - trusted_native
      - static_resource
      - foreign_capsule
      type: string
    CompositionLock:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        components:
          items:
            $ref: '#/components/schemas/ComponentLockPin'
          type: array
        content_roots:
          items:
            $ref: '#/components/schemas/ArtifactDescriptor'
          type: array
        protocol_profiles:
          items:
            $ref: '#/components/schemas/ProtocolProfilePin'
          type: array
        schema:
          type: string
      required:
      - components
      - content_roots
      - protocol_profiles
      - schema
      title: CompositionLock
      type: object
    ContractAdapter:
      enum:
      - identity
      type: string
    ContractAlias:
      properties:
        canonical_id:
          type: string
        deprecated_in:
          type:
          - string
          - 'null'
        id:
          type: string
        introduced_in:
          type: string
        maturity:
          $ref: '#/components/schemas/ContractMaturity'
        replacement:
          type:
          - string
          - 'null'
        request_adapter:
          $ref: '#/components/schemas/ContractAdapter'
        response_adapter:
          $ref: '#/components/schemas/ContractAdapter'
        support_until:
          type:
          - string
          - 'null'
      required:
      - canonical_id
      - id
      - introduced_in
      - maturity
      - request_adapter
      - response_adapter
      type: object
    ContractDiagnostic:
      properties:
        canonical_id:
          type: string
        code:
          type: string
        deprecated_in:
          type:
          - string
          - 'null'
        maturity:
          $ref: '#/components/schemas/ContractMaturity'
        message:
          type: string
        replacement:
          type:
          - string
          - 'null'
        requested_id:
          type: string
        severity:
          type: string
        support_until:
          type:
          - string
          - 'null'
      required:
      - canonical_id
      - code
      - maturity
      - message
      - requested_id
      - severity
      type: object
    ContractLayerInfo:
      properties:
        description:
          type: string
        id:
          $ref: '#/components/schemas/ContractOwnerLayer'
        maturity:
          $ref: '#/components/schemas/ContractMaturity'
      required:
      - description
      - id
      - maturity
      type: object
    ContractMaturity:
      enum:
      - experimental
      - candidate
      - stable
      - deprecated
      - legacy_adapter
      type: string
    ContractMethod:
      properties:
        aliases:
          items:
            $ref: '#/components/schemas/ContractAlias'
          type: array
        canonical_id:
          type: string
        deprecated_in:
          type:
          - string
          - 'null'
        implementation_status:
          $ref: '#/components/schemas/MethodStatus'
        introduced_in:
          type: string
        maturity:
          $ref: '#/components/schemas/ContractMaturity'
        owner_layer:
          $ref: '#/components/schemas/ContractOwnerLayer'
        replacement:
          type:
          - string
          - 'null'
        request_adapter:
          $ref: '#/components/schemas/ContractAdapter'
        request_schema:
          type: string
        response_adapter:
          $ref: '#/components/schemas/ContractAdapter'
        response_schema:
          type: string
        streaming:
          type: boolean
      required:
      - aliases
      - canonical_id
      - implementation_status
      - introduced_in
      - maturity
      - owner_layer
      - request_adapter
      - request_schema
      - response_adapter
      - response_schema
      - streaming
      type: object
    ContractMode:
      oneOf:
      - description: 'Path A: full v1 contract enforcement (default).'
        enum:
        - v1
        type: string
      - description: 'Path B: self-contained app — kernel hosts process, no contract enforcement.'
        enum:
        - none
        type: string
    ContractOwnerLayer:
      enum:
      - substrate
      - host
      - protocol
      - shell
      - cross_layer
      - legacy_adapter
      type: string
    ContractProfileInfo:
      properties:
        id:
          type: string
        maturity:
          $ref: '#/components/schemas/ContractMaturity'
        versions:
          items:
            $ref: '#/components/schemas/ContractVersionRequirement'
          type: array
      required:
      - id
      - maturity
      - versions
      type: object
    ContractSelection:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        profile:
          type: string
        protocols:
          items:
            $ref: '#/components/schemas/ProtocolSelection'
          type: array
        versions:
          items:
            $ref: '#/components/schemas/ContractVersionRequirement'
          type: array
      required:
      - profile
      title: ContractSelection
      type: object
    ContractVersionInfo:
      properties:
        layer:
          $ref: '#/components/schemas/ContractOwnerLayer'
        maturity:
          $ref: '#/components/schemas/ContractMaturity'
        version:
          type: string
      required:
      - layer
      - maturity
      - version
      type: object
    ContractVersionRequirement:
      properties:
        layer:
          $ref: '#/components/schemas/ContractOwnerLayer'
        version:
          type: string
      required:
      - layer
      - version
      type: object
    DeclaredAuthority:
      properties:
        assets_read:
          type: boolean
        assets_write:
          type: boolean
        capabilities_invoke:
          items:
            type: string
          type: array
        events_append:
          type: boolean
        events_read:
          type: boolean
        network_hosts:
          items:
            type: string
          type: array
        secret_refs:
          items:
            type: string
          type: array
      required:
      - assets_read
      - assets_write
      - capabilities_invoke
      - events_append
      - events_read
      - network_hosts
      - secret_refs
      type: object
    DependencySource:
      oneOf:
      - description: Built-in to Yggdrasil (no fetch needed; resolves at host runtime)
        properties:
          kind:
            enum:
            - internal
            type: string
        required:
        - kind
        type: object
      - description: Fetched from a git remote
        properties:
          kind:
            enum:
            - git
            type: string
          ref:
            default: ''
            description: Tag, branch, or commit ref
            type: string
          url:
            type: string
        required:
        - kind
        - url
        type: object
      - description: Local filesystem path (for development)
        properties:
          kind:
            enum:
            - local
            type: string
          path:
            type: string
        required:
        - kind
        - path
        type: object
    DeploymentHealthEventPayload:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        failure_count:
          format: uint32
          minimum: 0.0
          type: integer
        port_lease_id:
          type:
          - string
          - 'null'
        previous_ready:
          type: boolean
        probe:
