  /rpc/kernel.v1.capability.cancel:
    post:
      operationId: capabilityCancel
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                id:
                  oneOf:
                  - type: string
                  - type: integer
                  - type: 'null'
                jsonrpc:
                  const: '2.0'
                method:
                  const: kernel.v1.capability.cancel
                params:
                  $schema: https://json-schema.org/draft/2020-12/schema
                  properties:
                    invocation_id:
                      type:
                      - string
                      - 'null'
                    session_id:
                      type:
                      - string
                      - 'null'
                    stream_id:
                      type:
                      - string
                      - 'null'
                  title: CapabilityCancelParams
                  type: object
              required:
              - jsonrpc
              - id
              - method
              - params
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  error:
                    properties:
                      code:
                        type: integer
                      data: true
                      message:
                        type: string
                    required:
                    - code
                    - message
                    type: object
                  id:
                    oneOf:
                    - type: string
                    - type: integer
                    - type: 'null'
                  jsonrpc:
                    const: '2.0'
                  result:
                    $defs:
                      RedactionState:
                        description: |-
                          Redaction state for an outbound audit record.

                          Every outbound request carries one of these states to indicate whether raw body/header/prompt/response data was preserved. The default is `NotCaptured` — raw data is never saved unless explicitly approved.
                        oneOf:
                        - description: Raw data was not captured (default).
                          enum:
                          - not_captured
                          type: string
                        - description: Raw data was redacted before recording.
                          enum:
                          - redacted
                          type: string
                        - description: Only a policy reference is stored; no data captured.
                          enum:
                          - policy_ref
                          type: string
                        - description: Request was blocked as unsafe; no data recorded.
                          enum:
                          - unsafe_blocked
                          type: string
                        - description: Explicit user/host approval to capture raw data (rare).
                          enum:
                          - explicitly_approved
                          type: string
                      StreamFrameType:
                        description: The type of a stream frame — content-free, no model/prompt semantics.
                        oneOf:
                        - description: First frame of a streaming invocation.
                          enum:
                          - start
                          type: string
                        - description: A data chunk in the stream.
                          enum:
                          - chunk
                          type: string
                        - description: Progress indication (no data payload).
                          enum:
                          - progress
                          type: string
                        - description: Normal terminal frame.
                          enum:
                          - end
                          type: string
                        - description: Error terminal frame.
                          enum:
                          - error
                          type: string
                        - description: Cancelled terminal frame.
                          enum:
                          - cancelled
                          type: string
                        - description: Timeout terminal frame.
                          enum:
                          - timeout
                          type: string
                    $schema: https://json-schema.org/draft/2020-12/schema
                    description: |-
                      Generic stream frame envelope — the unit of streaming capability output.

                      This is a content-free protocol shape. It carries invocation/stream identifiers, sequencing, and redaction state, but no model, prompt, agent, or message semantics. The `payload` field is opaque JSON controlled by the capability provider.
                    properties:
                      frame_type:
                        allOf:
                        - $ref: '#/$defs/StreamFrameType'
                        description: Frame type discriminant.
                      invocation_id:
                        description: The invocation this frame belongs to.
                        type: string
                      metadata:
                        default: null
                        description: Opaque metadata — capability-provider-defined.
                      payload:
                        default: null
                        description: Opaque payload — capability-provider-defined; no kernel content semantics. May be `Null` for progress/end/cancelled/timeout frames.
                      redaction_state:
                        allOf:
                        - $ref: '#/$defs/RedactionState'
                        default: not_captured
                        description: Redaction state applied to the payload.
                      sequence:
                        description: Monotonically increasing sequence within this stream.
                        format: uint64
                        minimum: 0.0
                        type: integer
                      stream_id:
                        description: Unique stream id (may differ from invocation_id if a capability produces multiple concurrent streams).
                        type: string
                      timestamp:
                        default: 2026-05-23T16:35:57.510580645Z
                        description: Timestamp of frame emission.
                        format: date-time
                        type: string
                    required:
                    - frame_type
                    - invocation_id
                    - sequence
                    - stream_id
                    title: StreamFrameEnvelope
                    type: object
                required:
                - jsonrpc
                - id
                type: object
          description: JSON-RPC response envelope
      summary: Invoke kernel.v1.capability.cancel
