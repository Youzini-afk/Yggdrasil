schema_version: 1
id: official/model-connector-lab
version: 0.1.0
display_name: Official Model Connector Lab
description: No-network model provider family metadata, profile validation, secret masking, discovery plans, and compatibility reports.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/model-connector-lab/describe_families
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/model-connector-lab/validate_profile
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/model-connector-lab/mask_secret
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/model-connector-lab/discovery_plan
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/model-connector-lab/compat_report
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/model-connector-lab/home-card
      slot: home_card
      title: Model Connector Lab
      description: Validate provider profiles and draft model discovery plans without network calls.
      capability_id: official/model-connector-lab/describe_families
    - id: official/model-connector-lab/forge-panel
      slot: forge_panel
      title: Model Profile Inspector
      description: Inspect provider families, redacted profiles, discovery plans, and compatibility reports.
      capability_id: official/model-connector-lab/validate_profile
    - id: official/model-connector-lab/assistant-action
      slot: assistant_action
      title: Draft Model Profile Plan
      description: Prepare approval-gated model profile or discovery plan changes without raw secrets.
      capability_id: official/model-connector-lab/discovery_plan
      approval_policy: user_approval
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
