schema_version: 1
id: thirdparty/example-adapter
version: 0.1.0
display_name: Example External Project Adapter
description: "Example adapter/wrapper package preview proving unadapted external projects can be wrapped as ordinary Ygg packages. Generated from project-intake-lab adapter manifest preview — not written to filesystem, not auto-published, no network/filesystem/process permissions."
entry:
  kind: subprocess
  command:
    - node
    - examples/packages/external-project-adapter-preview/package.js
  transport: json_rpc_stdio
provides:
  - id: thirdparty/example-adapter/invoke
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces: []
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
