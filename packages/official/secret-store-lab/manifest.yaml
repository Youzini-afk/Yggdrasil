schema_version: 1
id: official/secret-store-lab
version: 0.1.0
display_name: Secret Store Lab
description: Local encrypted secret storage for API keys and credentials. Files at ~/.yggdrasil/secrets.dat (age-encrypted).
license: AGPL-3.0
entry:
  kind: rust_inproc
  crate_ref: official-secret-store-lab
  contract: v1
  symbol: official_secret_store_lab
  abi_version: 1
provides:
  - id: official/secret-store-lab/put_secret
    version: 1.0.0
    input_schema: { type: object }
    output_schema: { type: object }
    side_effects:
      - filesystem.write
    streaming: false
  - id: official/secret-store-lab/has_secret
    version: 1.0.0
    input_schema: { type: object }
    output_schema: { type: object }
    side_effects: []
    streaming: false
  - id: official/secret-store-lab/list_secrets
    version: 1.0.0
    input_schema: { type: object }
    output_schema: { type: object }
    side_effects: []
    streaming: false
  - id: official/secret-store-lab/delete_secret
    version: 1.0.0
    input_schema: { type: object }
    output_schema: { type: object }
    side_effects:
      - filesystem.write
    streaming: false
  - id: official/secret-store-lab/health
    version: 1.0.0
    input_schema: { type: object }
    output_schema: { type: object }
    side_effects: []
    streaming: false
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces: []
permissions:
  filesystem:
    read:
      - ~/.yggdrasil/
    write:
      - ~/.yggdrasil/secrets.dat
      - ~/.yggdrasil/secret-store.key
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
