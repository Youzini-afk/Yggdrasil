name: ci

on:
  workflow_call:
    inputs:
      release_version:
        description: Optional release tag whose version must match every first-party package.
        required: false
        type: string
        default: ""
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    name: Contract schemas + generated SDKs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Regenerate schemas and SDKs
        run: bash scripts/regen-sdks.sh

      - name: Validate schema compatibility
        run: |
          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -n "$base_sha" ] && git cat-file -e "$base_sha:docs/spec/v1/schemas" 2>/dev/null; then
            rm -rf /tmp/ygg-base-schemas
            mkdir -p /tmp/ygg-base-schemas
            git archive "$base_sha" docs/spec/v1/schemas | tar -x -C /tmp/ygg-base-schemas
            BASE_SCHEMA_DIR=/tmp/ygg-base-schemas/docs/spec/v1/schemas bash scripts/validate-schemas.sh
          else
            bash scripts/validate-schemas.sh
          fi

      - name: Verify generated files are committed
        run: test -z "$(git status --porcelain -- docs/spec/v1/schemas sdk)"

      - name: Verify release identity and versions
        if: inputs.release_version != ''
        run: |
          test "$GITHUB_REF" = "refs/tags/${{ inputs.release_version }}"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          bash scripts/check-release-version.sh "${{ inputs.release_version }}"

      - name: Upload regenerated files when verification fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-contracts-${{ github.sha }}
          path: |
            docs/spec/v1/schemas
            sdk
          retention-days: 3

  rust:
    name: Rust check + test + conformance
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Prepare desktop frontend placeholder
        run: |
          mkdir -p clients/web/dist
          printf '<!doctype html><title>CI placeholder</title>\n' > clients/web/dist/index.html

      - name: cargo check workspace
        run: cargo check --workspace

      - name: cargo test generated Rust SDK
        run: cargo test -p yg-kernel-sdk

      - name: cargo test ygg-runtime
        run: cargo test -p ygg-runtime --lib

      - name: Verified artifact target preview smoke
        run: |
          docker pull nginx:1.27-alpine
          YGG_TARGET_DEPLOYMENT_SMOKE=1 cargo test -p ygg-runtime verified_build_context_deploys_on_local_and_agent_targets_smoke -- --ignored --nocapture

      - name: cargo test ygg-service
        run: cargo test -p ygg-service --lib

      - name: cargo test ygg-cli
        run: cargo test -p ygg-cli

      - name: cargo test ygg-core
        run: cargo test -p ygg-core

      - name: cargo test desktop Host supervisor
        run: cargo test -p ygg-desktop --lib

      - name: ygg conformance
        run: cargo run -p ygg-cli --release -- conformance

  host-data-windows:
    name: Windows Host backup + restore
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Exercise private ACL backup and restore
        run: cargo test -p ygg-cli backup_and_restore_preserve_data_and_verify_sqlite

  web:
    name: Web typecheck + test + build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            sdk/typescript/kernel-sdk/package-lock.json

      - name: Install TypeScript SDK deps
        run: npm ci --prefix sdk/typescript/kernel-sdk

      - name: Test generated TypeScript SDK
        run: npm test --prefix sdk/typescript/kernel-sdk

      - name: Install web deps
        run: npm ci --prefix clients/web

      - name: Typecheck
        run: npm run check --prefix clients/web

      - name: Test
        run: npm run test --prefix clients/web

      - name: Build
        run: npm run build --prefix clients/web

  desktop-sidecar:
    name: Desktop managed Host smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install web deps
        run: npm ci --prefix clients/web

      - name: Stage Host sidecar and build client shell
        run: npm run prepare:dev --prefix clients/desktop

      - name: Smoke managed Host sidecar
        run: npm run smoke:sidecar --prefix clients/desktop
