contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: thirdparty/memory-lab/forge-panel
      slot: forge_panel
      title: Community Memory Lab Inspector
      description: Inspect package-owned memory records, retrieval traces, and provenance from a third-party memory lab without privileged access.
      capability_id: thirdparty/memory-lab/describe_memory_contract
    - id: thirdparty/memory-lab/assistant-action
      slot: assistant_action
      title: Community Memory Lab Assistant
      description: Draft approval-gated memory updates, corrections, or redaction plans from a community-maintained memory lab fully interchangeable with official/memory-lab.
      capability_id: thirdparty/memory-lab/draft_memory_update
      approval_policy: fork_then_approve
    - id: thirdparty/memory-lab/home-card
      slot: home_card
      title: Community Memory Lab
      description: Launch deterministic memory record and retrieval from a third-party memory lab without real inference, network, or kernel privilege.
      capability_id: thirdparty/memory-lab/record_memory
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
