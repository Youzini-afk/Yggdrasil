title: Yggdrasil Forge Host With Git Install Enabled (Example)

# Git install is opt-in. This example enables public HTTPS git fetches for
# package installation experiments. Do not enable it for untrusted profiles
# without reviewing allowed_hosts and install_root.
outbound:
  git:
    enabled: true
    executor: real
    allowed_hosts:
      - github.com
      - gitlab.com
      - codeberg.org
    https_only: true
    max_clone_size_mb: 64
    timeout_ms: 30000
    install_root: ./.ygg-installed-packages
    allow_redirects: false

autoload:
  - ../packages/official/package-installer-lab/manifest.yaml
