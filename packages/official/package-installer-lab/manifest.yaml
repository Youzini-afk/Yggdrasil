schema_version: 1
id: official/package-installer-lab
version: 0.1.0
display_name: Official Package Installer Lab
description: Ordinary package installer lab for public HTTPS git capability packages. Drafts approval-gated install plans, keeps install logic outside kernel package namespaces, and uses host-controlled git outbound policy. This stage is plan-only and performs no disk mutation.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/package-installer-lab/describe_install_contract
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/package-installer-lab/plan_install
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/package-installer-lab/apply_install
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects:
      - package_install
  - id: official/package-installer-lab/list_installed
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/package-installer-lab/uninstall
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects:
      - package_uninstall
  - id: official/package-installer-lab/update
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects:
      - package_install
  - id: official/package-installer-lab/inspect_lockfile
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/package-installer-lab/forge-panel
      slot: forge_panel
      title: Package Installer Lab
      description: Draft approval-gated public HTTPS git package install plans without mutating disk.
      capability_id: official/package-installer-lab/describe_install_contract
    - id: official/package-installer-lab/assistant-action
      slot: assistant_action
      title: Draft Git Package Install Plan
      description: Prepare a proposal draft for installing a capability package from a public HTTPS git repository.
      capability_id: official/package-installer-lab/plan_install
      approval_policy: user_approval
permissions:
  git_fetch:
    hosts:
      - github.com
      - gitlab.com
      - codeberg.org
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_quota_mb: 64
