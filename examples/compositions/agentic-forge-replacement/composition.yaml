id: example/agentic-forge-replacement
version: 0.1.0
entry_surface_id: thirdparty/agentic-forge/home-card
title: "Agentic Forge Replacement Composition"
description: "Proves that a third-party agentic-forge replacement satisfies the same surface/capability/candidate/proposal/inference/toolchain shape as official/agentic-forge-lab."
packages:
  - ../../packages/thirdparty-agentic-forge/manifest.yaml
required_surfaces:
  - home_card
  - forge_panel
  - assistant_action
required_capabilities:
  - thirdparty/agentic-forge/describe_contract
  - thirdparty/agentic-forge/start_run
  - thirdparty/agentic-forge/create_candidate
  - thirdparty/agentic-forge/compare_candidate
  - thirdparty/agentic-forge/draft_promote_proposal
  - thirdparty/agentic-forge/run_inference_node
  - thirdparty/agentic-forge/plan_toolchain
permission_expectations:
  - capabilities.invoke
replacement_candidates:
  - official/agentic-forge-lab
compatibility_notes:
  - "Third-party replacement exposes equivalent surface slots to official/agentic-forge-lab"
  - "No kernel privilege or official namespace required"
  - "Official agentic-forge-lab is a replacement candidate only — no routing priority"
  - "Both packages produce package-owned shapes: candidates, proposals, plan graphs, working state"
  - "Neither package may directly mutate target branches or perform network"
