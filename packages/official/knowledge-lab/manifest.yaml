schema_version: 1
id: official/knowledge-lab
version: 0.1.0
display_name: Official Knowledge Lab
description: Generic structured knowledge collection normalization, matching, injection planning, and diagnostics.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/knowledge-lab/import_collection
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/knowledge-lab/normalize_entries
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/knowledge-lab/match_entries
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/knowledge-lab/injection_plan
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/knowledge-lab/compat_report
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/knowledge-lab/home-card
      slot: home_card
      title: Knowledge Lab
      description: Normalize and match structured knowledge without making lorebooks canonical.
      capability_id: official/knowledge-lab/import_collection
    - id: official/knowledge-lab/forge-panel
      slot: forge_panel
      title: Knowledge Collection Inspector
      description: Inspect knowledge entries, deterministic match traces, and injection plans.
      capability_id: official/knowledge-lab/match_entries
    - id: official/knowledge-lab/assistant-action
      slot: assistant_action
      title: Draft Knowledge Injection Plan
      description: Prepare an approval-gated knowledge plan or compatibility report.
      capability_id: official/knowledge-lab/injection_plan
      approval_policy: user_approval
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
