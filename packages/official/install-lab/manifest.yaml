schema_version: 1
id: official/install-lab
version: 0.1.0
display_name: Install Lab
description: Package installation orchestrator; composes git-tools, integrity, and project-intake.
license: AGPL-3.0
entry:
  kind: rust_inproc
  crate_ref: official-install-lab
  contract: v1
  symbol: official_install_lab
  abi_version: 1
provides:
  - id: official/install-lab/list_installed
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects: []
    streaming: false
  - id: official/install-lab/resolve_plan
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects:
      - filesystem.write
    streaming: false
  - id: official/install-lab/execute_plan
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects:
      - filesystem.write
      - package.activation
    streaming: false
  - id: official/install-lab/detect_kind
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects:
      - filesystem.read
    streaming: false
  - id: official/install-lab/register_project
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects:
      - filesystem.write
    streaming: false
  - id: official/install-lab/prepare_external_intake
    version: 1.0.0
    input_schema:
      type: object
      additionalProperties: false
      required: [source]
      properties:
        source:
          type: string
        root_ref:
          type: string
        data_dir:
          type: string
        linked_local:
          type: boolean
    output_schema: {}
    side_effects:
      - filesystem.read
      - filesystem.write
      - network.read
    streaming: false
  - id: official/install-lab/uninstall
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects:
      - filesystem.write
    streaming: false
  - id: official/install-lab/check_lockfile
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects: []
    streaming: false
  - id: official/install-lab/check_for_updates
    version: 1.0.0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        profile:
          type: string
        data_dir:
          type: string
        project_id:
          type: string
        package_id:
          type: string
    output_schema: {}
    side_effects:
      - filesystem.read
      - network.read
    streaming: false
  - id: official/install-lab/update_project
    version: 1.0.0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        profile:
          type: string
        data_dir:
          type: string
        project_id:
          type: string
        package_id:
          type: string
        force:
          type: boolean
    output_schema: {}
    side_effects:
      - filesystem.read
      - filesystem.write
      - network.read
      - package.activation
    streaming: false
requires:
  - id: official/git-tools-lab
    source:
      kind: internal
    version: ">=0.1.0"
  - id: official/integrity-lab
    source:
      kind: internal
    version: ">=0.1.0"
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces: []
permissions:
  capabilities:
    invoke:
      - official/git-tools-lab/*
      - official/integrity-lab/*
  network:
    declarations:
      - host: github.com
        methods: [GET, POST]
        purpose: resolve git refs while checking installed package freshness
      - host: gitlab.com
        methods: [GET, POST]
        purpose: resolve git refs while checking installed package freshness
      - host: codeberg.org
        methods: [GET, POST]
        purpose: resolve git refs while checking installed package freshness
      - host: bitbucket.org
        methods: [GET, POST]
        purpose: resolve git refs while checking installed package freshness
  filesystem:
    read:
      - /tmp/yggdrasil-git/
      - ~/.yggdrasil/
    write:
      - /tmp/yggdrasil-git/
      - ~/.yggdrasil/store/
      - ~/.yggdrasil/profiles/
      - ~/.yggdrasil/cache/
      - ~/.yggdrasil/projects/
      - ~/.yggdrasil/workspaces/
sandbox_policy:
  cpu_quota_ms_per_invoke: 30000
  memory_mb: 512
  wall_clock_ms: 120000
