id: example/playable-creation-board-agentic-forge-replacement
version: 0.1.0
entry_surface_id: official/playable-creation-board/entry
title: "Playable Creation Board Agentic Forge Replacement Composition"
description: "Proves that a third-party agentic-forge can replace official/agentic-forge-lab when bound by official/playable-creation-board. The board package remains unchanged; only the forge provider is swapped."
packages:
  - ../../../packages/official/playable-creation-board/manifest.yaml
  - ../../../packages/official/experience-runtime-lab/manifest.yaml
  - ../../../examples/packages/thirdparty-agentic-forge/manifest.yaml
required_surfaces:
  - experience_entry
  - play_renderer
  - forge_panel
  - assistant_action
required_capabilities:
  - official/playable-creation-board/launch
  - official/playable-creation-board/record_player_action
  - official/playable-creation-board/request_change
  - official/playable-creation-board/create_checkpoint
  - official/playable-creation-board/draft_recovery
  - official/playable-creation-board/bind_agent_run
  - official/playable-creation-board/explain_provenance
  - thirdparty/agentic-forge/describe_contract
  - thirdparty/agentic-forge/start_run
  - thirdparty/agentic-forge/create_candidate
  - thirdparty/agentic-forge/draft_promote_proposal
permission_expectations:
  - capabilities.invoke
replacement_candidates:
  - official/agentic-forge-lab
compatibility_notes:
  - "Third-party agentic-forge provides equivalent forge_panel/assistant_action surface slots to official/agentic-forge-lab"
  - "official/playable-creation-board binds_agent_run accepts any agentic-forge provider; no official priority"
  - "No kernel privilege or official namespace required for forge binding"
  - "Both forge packages produce package-owned shapes: candidates, proposals, plan graphs, working state"
  - "Neither forge package may directly mutate target branches or perform network"
