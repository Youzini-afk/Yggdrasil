schema_version: 1
id: official/composition-lab
version: 0.1.0
display_name: Official Composition Lab
description: Generic composition authoring and launch planning package for package-based experiences.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/composition-lab/validate
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/composition-lab/describe
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/composition-lab/launch_plan
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/composition-lab/permission_preview
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/composition-lab/surface_graph
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/composition-lab/home-card
      slot: home_card
      title: Composition Lab
      description: Validate package composition, preview launch plans, and inspect surface wiring.
      capability_id: official/composition-lab/describe
    - id: official/composition-lab/forge-panel
      slot: forge_panel
      title: Composition Graph
      description: Inspect composition packages, required surfaces, permissions, and launch graph.
      capability_id: official/composition-lab/surface_graph
    - id: official/composition-lab/assistant-action
      slot: assistant_action
      title: Explain Composition
      description: Draft an approval-gated explanation or launch checklist for a composition.
      capability_id: official/composition-lab/launch_plan
      approval_policy: user_approval
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
