schema_version: 1
id: thirdparty/agent-runtime
version: 0.1.0
display_name: Community Agent Runtime
description: "Third-party agent runtime package proving official pi-agent-runtime-lab is replaceable: deterministic run plans, trace summaries, proposal drafts, and echo payloads without real model inference or network access."
entry:
  kind: rust_inproc
  crate_ref: example-thirdparty-agent-runtime
  symbol: register
  abi_version: 1
provides:
  - id: thirdparty/agent-runtime/run
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: true
    side_effects: []
  - id: thirdparty/agent-runtime/explain_run
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: thirdparty/agent-runtime/draft_proposal
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: thirdparty/agent-runtime/summarize_trace
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: thirdparty/agent-runtime/echo
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: thirdparty/agent-runtime/assistant-action
      slot: assistant_action
      title: Community Agent Runtime Assistant
      description: Draft approval-gated agent run proposals from a community-maintained runtime fully interchangeable with the official agent runtime.
      capability_id: thirdparty/agent-runtime/draft_proposal
      approval_policy: fork_then_approve
    - id: thirdparty/agent-runtime/forge-panel
      slot: forge_panel
      title: Community Agent Runtime Inspector
      description: Inspect agent run plans, trace summaries, and proposal drafts from a third-party runtime without privileged access.
      capability_id: thirdparty/agent-runtime/explain_run
    - id: thirdparty/agent-runtime/home-card
      slot: home_card
      title: Community Agent Runtime
      description: Launch deterministic agent run plans from a third-party runtime without real inference or network.
      capability_id: thirdparty/agent-runtime/run
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
