schema_version: 1
id: official/package-lab
version: 0.1.0
display_name: Official Package Lab
description: Infrastructure capability package for host/package behavior exercises. No official privilege.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/package-lab/echo
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/package-lab/fail
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/package-lab/describe
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/package-lab/home-card
      slot: home_card
      title: Package Lab
      description: Exercise package/capability behavior through the public protocol.
      capability_id: official/package-lab/describe
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
