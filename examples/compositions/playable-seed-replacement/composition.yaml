id: example/playable-seed-replacement
version: 0.1.0
entry_surface_id: thirdparty/playable-seed/entry
title: "Playable Seed Replacement Composition"
description: "Proves that a third-party playable-seed replacement satisfies the same surface/capability shape as the official seed."
packages:
  - ../../packages/thirdparty-playable-seed/manifest.yaml
required_surfaces:
  - experience_entry
  - play_renderer
  - forge_panel
  - assistant_action
  - asset_editor
required_capabilities:
  - thirdparty/playable-seed/launch
  - thirdparty/playable-seed/render_payload
  - thirdparty/playable-seed/describe_state
  - thirdparty/playable-seed/propose_change
  - thirdparty/playable-seed/edit_asset
permission_expectations:
  - capabilities.invoke
replacement_candidates:
  - official/playable-seed
compatibility_notes:
  - "Third-party replacement exposes equivalent surface slots to official/playable-seed"
  - "No kernel privilege or official namespace required"
