schema_version: 1
id: official/git-tools-lab
version: 0.1.0
display_name: Git Tools Lab
description: Pure-Rust git operations over HTTPS for package installation.
license: AGPL-3.0
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  contract: v1
  symbol: register
  abi_version: 1
provides:
  - id: official/git-tools-lab/resolve_ref
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects: []
    streaming: false
  - id: official/git-tools-lab/fetch_refs
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects: []
    streaming: false
  - id: official/git-tools-lab/fetch_tree
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects:
      - filesystem.write
    streaming: false
  - id: official/git-tools-lab/read_signed_tag
    version: 1.0.0
    input_schema: {}
    output_schema: {}
    side_effects: []
    streaming: false
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces: []
permissions:
  network:
    declarations:
      - host: github.com
        methods: [GET, POST]
      - host: "*.githubusercontent.com"
        methods: [GET]
      - host: gitlab.com
        methods: [GET, POST]
      - host: "*.gitlab.com"
        methods: [GET]
      - host: codeberg.org
        methods: [GET, POST]
      - host: bitbucket.org
        methods: [GET, POST]
  filesystem:
    write:
      - /tmp/yggdrasil-git/
      - ~/.yggdrasil/cache/git/
      - ~/.yggdrasil/store/
sandbox_policy:
  cpu_quota_ms_per_invoke: 30000
  memory_mb: 512
  wall_clock_ms: 120000
