title: Yggdrasil Forge Host With Live Model Outbound Enabled (Example)

# Live HTTP outbound for model API calls is opt-in. This example enables
# HTTPS outbound execute for provider API calls. Do not use this directly —
# copy and edit allowed_hosts to match your provider needs.
# Set environment variables for any API keys referenced via secret_ref:env:NAME
# (e.g., OPENAI_API_KEY, DEEPSEEK_API_KEY, ANTHROPIC_API_KEY).
#
# The live executor is HTTPS-only, does not follow redirects, and never echoes
# raw auth/body content in audit or response shapes. Secret headers are
# injected from host-resolved secret_refs at execution time only.

outbound:
  git:
    enabled: false
    executor: deny_all
    allowed_hosts: []
  execute:
    enabled: true
    executor: live
    allowed_hosts:
      - api.openai.com
      - api.deepseek.com
      - api.anthropic.com
      - openrouter.ai
      - generativelanguage.googleapis.com
    https_only: true
    timeout_ms: 30000
    allow_redirects: false
    allow_insecure_loopback_for_tests: false

autoload:
  - ../packages/official/playable-creation-board/manifest.yaml
