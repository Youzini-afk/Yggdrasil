  /rpc/kernel.v1.outbound.audit:
    post:
      operationId: outboundAudit
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                id:
                  oneOf:
                  - type: string
                  - type: integer
                  - type: 'null'
                jsonrpc:
                  const: '2.0'
                method:
                  const: kernel.v1.outbound.audit
                params:
                  $schema: https://json-schema.org/draft/2020-12/schema
                  properties:
                    package_id:
                      type: string
                  required:
                  - package_id
                  title: OutboundAuditParams
                  type: object
              required:
              - jsonrpc
              - id
              - method
              - params
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  error:
                    properties:
                      code:
                        type: integer
                      data: true
                      message:
                        type: string
                    required:
                    - code
                    - message
                    type: object
                  id:
                    oneOf:
                    - type: string
                    - type: integer
                    - type: 'null'
                  jsonrpc:
                    const: '2.0'
                  result:
                    items:
                      $defs:
                        RedactionState:
                          description: |-
                            Redaction state for an outbound audit record.

                            Every outbound request carries one of these states to indicate whether raw body/header/prompt/response data was preserved. The default is `NotCaptured` — raw data is never saved unless explicitly approved.
                          oneOf:
                          - description: Raw data was not captured (default).
                            enum:
                            - not_captured
                            type: string
                          - description: Raw data was redacted before recording.
                            enum:
                            - redacted
                            type: string
                          - description: Only a policy reference is stored; no data captured.
                            enum:
                            - policy_ref
                            type: string
                          - description: Request was blocked as unsafe; no data recorded.
                            enum:
                            - unsafe_blocked
                            type: string
                          - description: Explicit user/host approval to capture raw data (rare).
                            enum:
                            - explicitly_approved
                            type: string
                      $schema: https://json-schema.org/draft/2020-12/schema
                      description: |-
                        Generic outbound audit record / envelope.

                        Records an outbound network request made by a package through Ygg-provided network/request helpers. This is a kernel event payload — it does NOT contain raw secrets, bodies, headers, prompts, or responses. Only `secret_ref` identifiers and the `redaction_state` are recorded.
                      properties:
                        capability_id:
                          description: Capability through which the request was made.
                          type: string
                        cost:
                          default: null
                          description: Cost placeholder.
                        destination_host:
                          description: Destination host.
                          type: string
                        error:
                          default: null
                          description: Error message if status is not "allowed".
                          type:
                          - string
                          - 'null'
                        id:
                          description: Unique record id.
                          type: string
                        method:
                          description: HTTP method (GET, POST, etc).
                          type: string
                        package_id:
                          description: Package that owns the outbound request.
                          type: string
                        principal:
                          description: The principal that initiated the request.
                          type: string
                        purpose:
                          default: null
                          description: Declared purpose from the manifest or request context.
                          type:
                          - string
                          - 'null'
                        redaction_state:
                          allOf:
                          - $ref: '#/$defs/RedactionState'
                          default: not_captured
                          description: Redaction state — what data, if any, was recorded.
                        secret_refs_used:
                          default: []
                          description: Secret references used (not raw secrets).
                          items:
                            type: string
                          type: array
                        status:
                          description: 'Request status: "allowed", "denied", "error", etc.'
                          type: string
                        usage:
                          default: null
                          description: Usage placeholder (e.g. token count).
                      required:
                      - capability_id
                      - destination_host
                      - id
                      - method
                      - package_id
                      - principal
                      - status
                      title: OutboundAuditRecord
                      type: object
                    type: array
                required:
                - jsonrpc
