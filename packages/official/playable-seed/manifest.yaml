schema_version: 1
id: official/playable-seed
version: 0.1.0
display_name: Official Playable Seed
description: Reference playable package proving launch, render payload, Forge inspection, and approval-gated edits without defining a game runtime.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/playable-seed/create
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/playable-seed/launch
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/playable-seed/describe_state
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/playable-seed/render_payload
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/playable-seed/propose_change
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/playable-seed/entry
      slot: experience_entry
      title: Playable Seed
      description: Launch a reference package-backed playable seed that can be forked and edited through proposals.
      capability_id: official/playable-seed/launch
      activation:
        launch_capability_id: official/playable-seed/launch
        session_template:
          labels: [playable-seed, reference]
      approval_policy: none
    - id: official/playable-seed/play-renderer
      slot: play_renderer
      title: Playable Seed Renderer
      description: Protocol-visible render payload for the reference playable seed.
      capability_id: official/playable-seed/render_payload
    - id: official/playable-seed/forge-panel
      slot: forge_panel
      title: Playable Seed Inspector
      description: Inspect the package-provided seed state and edit proposal shape.
      capability_id: official/playable-seed/describe_state
    - id: official/playable-seed/assistant-action
      slot: assistant_action
      title: Propose Seed Change
      description: Draft a user-approved edit proposal for the playable seed.
      capability_id: official/playable-seed/propose_change
      approval_policy: fork_then_approve
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
