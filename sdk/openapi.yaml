        enum:
        - ndjson
        type: string
      - description: Raw binary stream. Emits chunks as they arrive.
        enum:
        - raw
        type: string
    StreamFrameEnvelope:
      $schema: https://json-schema.org/draft/2020-12/schema
      description: |-
        Generic stream frame envelope — the unit of streaming capability output.

        This is a content-free protocol shape. It carries invocation/stream identifiers, sequencing, and redaction state, but no model, prompt, agent, or message semantics. The `payload` field is opaque JSON controlled by the capability provider.
      properties:
        frame_type:
          allOf:
          - $ref: '#/components/schemas/StreamFrameType'
          description: Frame type discriminant.
        invocation_id:
          description: The invocation this frame belongs to.
          type: string
        metadata:
          default: null
          description: Opaque metadata — capability-provider-defined.
        payload:
          default: null
          description: Opaque payload — capability-provider-defined; no kernel content semantics. May be `Null` for progress/end/cancelled/timeout frames.
        redaction_state:
          allOf:
          - $ref: '#/components/schemas/RedactionState'
          default: not_captured
          description: Redaction state applied to the payload.
        sequence:
          description: Monotonically increasing sequence within this stream.
          format: uint64
          minimum: 0.0
          type: integer
        stream_id:
          description: Unique stream id (may differ from invocation_id if a capability produces multiple concurrent streams).
          type: string
        timestamp:
          description: Timestamp of frame emission.
          format: date-time
          type: string
      required:
      - frame_type
      - invocation_id
      - sequence
      - stream_id
      title: StreamFrameEnvelope
      type: object
    StreamFrameEnvelope2:
      $schema: https://json-schema.org/draft/2020-12/schema
      description: |-
        Generic stream frame envelope — the unit of streaming capability output.

        This is a content-free protocol shape. It carries invocation/stream identifiers, sequencing, and redaction state, but no model, prompt, agent, or message semantics. The `payload` field is opaque JSON controlled by the capability provider.
      properties:
        frame_type:
          allOf:
          - $ref: '#/components/schemas/StreamFrameType'
          description: Frame type discriminant.
        invocation_id:
          description: The invocation this frame belongs to.
          type: string
        metadata:
          default: null
          description: Opaque metadata — capability-provider-defined.
        payload:
          default: null
          description: Opaque payload — capability-provider-defined; no kernel content semantics. May be `Null` for progress/end/cancelled/timeout frames.
        receipt:
          anyOf:
          - $schema: https://json-schema.org/draft/2020-12/schema
            properties:
              annotations:
                additionalProperties: true
                default: {}
                type: object
              artifact_type_uri:
                type: string
              digest:
                type: string
              media_type:
                type: string
              references:
                default: []
                items:
                  type: string
                type: array
              size_bytes:
                format: uint64
                minimum: 0.0
                type: integer
            required:
            - artifact_type_uri
            - digest
            - media_type
            - size_bytes
            title: ArtifactDescriptor
            type: object
          - type: 'null'
          default: null
        redaction_state:
          allOf:
          - $ref: '#/components/schemas/RedactionState'
          default: not_captured
          description: Redaction state applied to the payload.
        sequence:
          description: Monotonically increasing sequence within this stream.
          format: uint64
          minimum: 0.0
          type: integer
        stream_id:
          description: Unique stream id (may differ from invocation_id if a capability produces multiple concurrent streams).
          type: string
        timestamp:
          description: Timestamp of frame emission.
          format: date-time
          type: string
      required:
      - frame_type
      - invocation_id
      - sequence
      - stream_id
      title: StreamFrameEnvelope
      type: object
    StreamFrameType:
      description: The type of a stream frame — content-free, no model/prompt semantics.
      oneOf:
      - description: First frame of a streaming invocation.
        enum:
        - start
        type: string
      - description: A data chunk in the stream.
        enum:
        - chunk
        type: string
      - description: Progress indication (no data payload).
        enum:
        - progress
        type: string
      - description: Normal terminal frame.
        enum:
        - end
        type: string
      - description: Error terminal frame.
        enum:
        - error
        type: string
      - description: Cancelled terminal frame.
        enum:
        - cancelled
        type: string
      - description: Timeout terminal frame.
        enum:
        - timeout
        type: string
    StreamStartStatus:
      description: Status returned when a streaming outbound request starts.
      oneOf:
      - description: Stream started successfully.
        enum:
        - ok
        type: string
      - description: Stream request was denied by policy.
        enum:
        - denied
        type: string
      - description: Stream request encountered an error before starting.
        enum:
        - error
        type: string
    StreamStartedPayload:
