title: Yggdrasil Host with Env Secrets Example
secret_resolver:
  # Store-backed refs remain enabled by default for UI-saved keys:
  # secret_ref:store:OPENAI_API_KEY
  store_enabled: true
  # Env-backed refs are opt-in per variable name:
  # secret_ref:env:OPENAI_API_KEY
  env_allowlist:
    - OPENAI_API_KEY
    - ANTHROPIC_API_KEY
    - GOOGLE_API_KEY
autoload: []
