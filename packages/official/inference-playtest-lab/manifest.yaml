schema_version: 1
id: official/inference-playtest-lab
version: 0.1.0
display_name: Official Inference Playtest Lab
description: Ygg-native inference proposal vertical slice. Proves inference is not prompt->text but ordinary package participation in session/branch/proposal/inspection/fork creative runtime. No network, no secrets.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/inference-playtest-lab/draft_proposal
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/inference-playtest-lab/inspect_proposal
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/inference-playtest-lab/branch_plan
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/inference-playtest-lab/explain_flow
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/inference-playtest-lab/forge-panel
      slot: forge_panel
      title: Inference Playtest Inspector
      description: Inspect inference-derived proposal drafts, provenance, and inspection/branch flows.
      capability_id: official/inference-playtest-lab/inspect_proposal
    - id: official/inference-playtest-lab/assistant-action
      slot: assistant_action
      title: Inference Proposal Draft
      description: Draft an inference-derived proposal for user approval.
      capability_id: official/inference-playtest-lab/draft_proposal
      requires_user_approval: true
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
