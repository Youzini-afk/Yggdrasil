components:
  schemas:
    CapabilityDescriptor:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        description:
          default: null
          type:
          - string
          - 'null'
        id:
          type: string
        input_schema:
          default: null
        output_schema:
          default: null
        side_effects:
          default: []
          items:
            type: string
          type: array
        streaming:
          default: false
          type: boolean
        version:
          type: string
      required:
      - id
      - version
      title: CapabilityDescriptor
      type: object
    CapabilityInvocationRequest:
      $defs:
        CapHandleId:
          format: uint128
          type: string
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        caller_package_id:
          default: null
          type:
          - string
          - 'null'
        capability_id:
          default: null
          description: Legacy path. Runtime auto-mints a one-use transient handle when no handle is supplied.
          type:
          - string
          - 'null'
        handle:
          anyOf:
          - $ref: '#/$defs/CapHandleId'
          - type: 'null'
          default: null
          description: 'New preferred path: invoke by kernel-minted handle.'
        input:
          default: null
        provider_package_id:
          default: null
          type:
          - string
          - 'null'
        session_id:
          description: Kernel session id this invocation is part of, if any. Propagated from ProtocolContext for downstream scope resolution.
          type:
          - string
          - 'null'
        version:
          default: null
          type:
          - string
          - 'null'
      title: CapabilityInvocationRequest
      type: object
    CapabilityInvocationResult:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        capability_id:
          type: string
        correlation_id:
          format: uuid
          type: string
        duration_ms:
          format: uint64
          minimum: 0.0
          type: integer
        output: true
        provider_package_id:
          type: string
      required:
      - capability_id
      - correlation_id
      - duration_ms
      - output
      - provider_package_id
      title: CapabilityInvocationResult
      type: object
    EventEnvelope:
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        id:
          type: string
        kind:
          type: string
        metadata:
          default: null
        payload: true
        schema_version:
          format: uint16
          minimum: 0.0
          type: integer
        sequence:
          format: uint64
          minimum: 0.0
          type: integer
        session_id:
          type: string
        timestamp:
          format: date-time
          type: string
        writer_package_id:
          type: string
      required:
      - id
      - kind
      - payload
      - schema_version
      - sequence
      - session_id
      - timestamp
      - writer_package_id
      title: EventEnvelope
      type: object
    PackageManifest:
      $defs:
        AssetPermissions:
          properties:
            read:
              default: false
              type: boolean
            write:
              default: false
              type: boolean
          type: object
        CapabilityDescriptor:
          properties:
            description:
              default: null
              type:
              - string
              - 'null'
            id:
              type: string
            input_schema:
              default: null
            output_schema:
              default: null
            side_effects:
              default: []
              items:
                type: string
              type: array
            streaming:
              default: false
              type: boolean
            version:
              type: string
          required:
          - id
          - version
          type: object
        CapabilityPermissions:
          properties:
            invoke:
              default: []
              items:
                type: string
              type: array
          type: object
        CapabilityRequirement:
          properties:
            id:
              type: string
            version:
              type: string
          required:
          - id
          - version
          type: object
        ContractMode:
          oneOf:
          - description: 'Path A: full v1 contract enforcement (default).'
            enum:
            - v1
            type: string
          - description: 'Path B: self-contained app — kernel hosts process, no contract enforcement.'
            enum:
            - none
            type: string
        DependencySource:
          oneOf:
          - description: Built-in to Yggdrasil (no fetch needed; resolves at host runtime)
            properties:
              kind:
                enum:
                - internal
                type: string
            required:
            - kind
            type: object
          - description: Fetched from a git remote
            properties:
              kind:
                enum:
                - git
                type: string
              ref:
                default: ''
                description: Tag, branch, or commit ref
                type: string
              url:
                type: string
            required:
            - kind
            - url
            type: object
          - description: Local filesystem path (for development)
            properties:
              kind:
                enum:
                - local
                type: string
              path:
                type: string
            required:
            - kind
            - path
            type: object
        EntryDescriptor:
          oneOf:
          - properties:
              abi_version:
                format: uint16
                minimum: 0.0
                type: integer
              crate_ref:
                type: string
              kind:
                enum:
                - rust_inproc
                type: string
              symbol:
                type: string
            required:
            - abi_version
            - crate_ref
            - kind
            - symbol
            type: object
          - properties:
              command:
                items:
                  type: string
                type: array
              kind:
                enum:
                - subprocess
                type: string
              transport:
                allOf:
                - $ref: '#/$defs/SubprocessTransport'
                default: json_rpc_stdio
            required:
            - command
            - kind
            type: object
          - properties:
              abi_version:
                format: uint16
                minimum: 0.0
                type: integer
              kind:
                enum:
                - wasm
                type: string
              memory_limit_mb:
                format: uint64
                minimum: 0.0
                type: integer
              module:
                type: string
            required:
            - abi_version
            - kind
            - memory_limit_mb
            - module
            type: object
          - properties:
              auth:
                $ref: '#/$defs/RemoteAuth'
              endpoint:
                type: string
              kind:
                enum:
                - remote
                type: string
            required:
            - auth
            - endpoint
            - kind
            type: object
          properties:
            contract:
              allOf:
              - $ref: '#/$defs/ContractMode'
              default: v1
              description: Path A (`v1`) enforces the Yggdrasil package contract. Path B (`none`) is a self-contained app hosted by the kernel without manifest contract enforcement.
          type: object
        EventPermissions:
          properties:
            append:
              default: false
              type: boolean
            read:
              default: false
              type: boolean
          type: object
        ExtensionPointDescriptor:
          properties:
            id:
              type: string
            modifiable:
              type: boolean
            payload_schema:
              default: null
            short_circuit:
              type: boolean
            timing:
              $ref: '#/$defs/HookTiming'
            version:
              type: string
          required:
          - id
          - modifiable
          - short_circuit
          - timing
          - version
          type: object
        FilesystemPermissions:
          properties:
            read:
              default: []
              items:
                type: string
              type: array
            write:
              default: []
              items:
                type: string
              type: array
          type: object
        HookSubscription:
          properties:
            extension_point:
              type: string
            handler:
              type: string
            precedence:
              default: 0
              format: int32
              type: integer
            timing:
              $ref: '#/$defs/HookTiming'
          required:
          - extension_point
          - handler
          - timing
          type: object
        HookTiming:
          enum:
          - sync
          - async
          type: string
        NetworkDeclaration:
          description: |-
            A single network access declaration in a package manifest.

            Each entry describes an allowed outbound destination with host, permitted HTTP methods, and a human-readable purpose. The runtime / host policy checker matches outbound requests against declared entries. Packages with no `network` declarations must not make any outbound network requests.
          properties:
            host:
              description: Destination host (e.g. `"api.openai.com"` or `"*.example.org"`).
              type: string
            methods:
              default: []
              description: Permitted HTTP/WebSocket methods (e.g. `["GET", "POST", "WEBSOCKET"]`). Empty means all.
              items:
                type: string
              type: array
            purpose:
              default: null
              description: Human-readable purpose for this network access.
              type:
              - string
              - 'null'
          required:
          - host
          type: object
        NetworkPermissions:
          properties:
            declarations:
              default: []
              description: Structured network declarations (host, methods, purpose).
              items:
                $ref: '#/$defs/NetworkDeclaration'
              type: array
            hosts:
              default: []
              description: Flat host list for backward compatibility. Packages using the structured form should populate `declarations` instead.
              items:
                type: string
              type: array
          type: object
        PackageContributions:
          properties:
            extension_points:
              default: []
              items:
                $ref: '#/$defs/ExtensionPointDescriptor'
              type: array
            hooks:
              default: []
              items:
                $ref: '#/$defs/HookSubscription'
              type: array
            schemas:
              default: []
              items:
                $ref: '#/$defs/SchemaContribution'
              type: array
            surfaces:
              default: []
              items:
                $ref: '#/$defs/SurfaceContribution'
              type: array
          type: object
        PackageDependency:
          properties:
            id:
              description: Logical package id (must match the dependency's manifest.id once resolved)
              type: string
            minimum_signed_by:
              description: 'Optional: GPG public key fingerprints required to sign this dep If empty, no signature verification required If set, the dep''s GPG-signed tag must be signed by one of these'
              items:
                type: string
              type: array
            source:
              allOf:
              - $ref: '#/$defs/DependencySource'
              description: Where the package comes from
            version:
              default: ''
              description: Semver constraint (e.g., ">=1.0.0", "^2.1", "=1.2.3") Empty string means "any version"
              type: string
          required:
          - id
          - source
          type: object
        PackagePermissions:
          properties:
            call:
              default: []
              items:
                type: string
              type: array
          type: object
        PermissionSet:
          properties:
            assets:
              allOf:
              - $ref: '#/$defs/AssetPermissions'
              default:
                read: false
                write: false
            capabilities:
              allOf:
              - $ref: '#/$defs/CapabilityPermissions'
              default:
                invoke: []
            events:
              allOf:
              - $ref: '#/$defs/EventPermissions'
              default:
                append: false
                read: false
            filesystem:
              allOf:
              - $ref: '#/$defs/FilesystemPermissions'
              default:
                read: []
                write: []
            network:
              allOf:
              - $ref: '#/$defs/NetworkPermissions'
              default:
                declarations: []
                hosts: []
            packages:
              allOf:
              - $ref: '#/$defs/PackagePermissions'
              default:
                call: []
            secret_refs:
              default: []
              description: |-
                Declared secret references this package may use in `kernel.v1.outbound.execute` calls. Each entry must be a valid env-backed secret reference (e.g. `secret_ref:env:OPENAI_API_KEY`, `secretRef:env:MY_KEY`, `secret-ref:env:NAME`, `host:env:NAME`).

                The runtime enforces fail-closed: any `secret_ref` used in `secret_headers` or top-level `secret_refs` at dispatch time **must** appear in this list, or the request is denied.

                Default: empty vec (no secret refs allowed; backward compatible).
              items:
                type: string
              type: array
          type: object
        RemoteAuth:
          properties:
            config:
              default: null
            scheme:
              type: string
          required:
          - scheme
          type: object
        SandboxPolicy:
          properties:
            cpu_quota_ms_per_invoke:
              default: 5000
              format: uint64
              minimum: 0.0
              type: integer
            memory_mb:
              default: 128
              format: uint64
              minimum: 0.0
              type: integer
            wall_clock_ms:
              default: 30000
              format: uint64
              minimum: 0.0
              type: integer
          type: object
        SchemaContribution:
          properties:
            id:
              type: string
            schema: true
          required:
          - id
          - schema
          type: object
        SubprocessTransport:
          enum:
          - json_rpc_stdio
          - json_rpc_tcp
          type: string
        SurfaceActivation:
          properties:
            input_schema:
              default: null
            launch_capability_id:
              default: null
              type:
              - string
              - 'null'
            session_template:
              default: null
          type: object
        SurfaceApprovalPolicy:
          enum:
          - none
          - user_approval
          - fork_then_approve
          type: string
        SurfaceContribution:
          properties:
            activation:
              allOf:
              - $ref: '#/$defs/SurfaceActivation'
              default:
                input_schema: null
                launch_capability_id: null
                session_template: null
            approval_policy:
              anyOf:
              - $ref: '#/$defs/SurfaceApprovalPolicy'
              - type: 'null'
              default: null
            capability_id:
              default: null
              type:
              - string
              - 'null'
            description:
              default: null
              type:
              - string
              - 'null'
            id:
              type: string
            metadata:
              default: null
            required_permissions:
              default: []
              items:
                $ref: '#/$defs/SurfacePermissionRequirement'
              type: array
            slot:
              $ref: '#/$defs/SurfaceSlot'
            title:
              type: string
            version:
              default: 0.1.0
              type: string
          required:
          - id
          - slot
          - title
          type: object
        SurfacePermissionRequirement:
          properties:
            permission:
              type: string
            reason:
              default: null
              type:
              - string
              - 'null'
            risk:
              allOf:
              - $ref: '#/$defs/SurfaceRisk'
              default: low
            scope:
              default: null
              type:
              - string
              - 'null'
          required:
          - permission
          type: object
        SurfaceRisk:
          enum:
          - low
          - medium
          - high
          type: string
        SurfaceSlot:
          enum:
          - experience_entry
          - home_card
          - play_renderer
          - forge_panel
          - asset_editor
          - assistant_action
          type: string
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        author:
          default: null
          type:
          - string
          - 'null'
        consumes:
          default: []
          items:
            $ref: '#/$defs/CapabilityRequirement'
          type: array
        contributes:
          allOf:
          - $ref: '#/$defs/PackageContributions'
          default:
            extension_points: []
            hooks: []
            schemas: []
            surfaces: []
        description:
          default: null
          type:
          - string
          - 'null'
        display_name:
          default: null
          type:
          - string
          - 'null'
        entry:
          $ref: '#/$defs/EntryDescriptor'
        id:
          type: string
        license:
          default: null
          type:
          - string
          - 'null'
        permissions:
          allOf:
          - $ref: '#/$defs/PermissionSet'
          default:
            assets:
              read: false
              write: false
            capabilities:
              invoke: []
            events:
              append: false
              read: false
            filesystem:
              read: []
              write: []
            network:
              declarations: []
              hosts: []
            packages:
              call: []
            secret_refs: []
        provides:
          default: []
          items:
            $ref: '#/$defs/CapabilityDescriptor'
          type: array
        requires:
          description: First-class package dependency declarations. Distinct from `consumes` (which declares capability requirements). Empty by default for backward compat.
          items:
            $ref: '#/$defs/PackageDependency'
          type: array
        sandbox_policy:
          allOf:
          - $ref: '#/$defs/SandboxPolicy'
          default:
            cpu_quota_ms_per_invoke: 5000
            memory_mb: 128
            wall_clock_ms: 30000
        schema_version:
          format: uint16
          minimum: 0.0
          type: integer
        version:
          type: string
      required:
      - entry
      - id
      - schema_version
      - version
      title: PackageManifest
      type: object
    PermissionSet2:
      $defs:
        AssetPermissions:
          properties:
            read:
              default: false
              type: boolean
            write:
              default: false
              type: boolean
          type: object
        CapabilityPermissions:
          properties:
            invoke:
              default: []
              items:
                type: string
              type: array
          type: object
        EventPermissions:
          properties:
            append:
              default: false
              type: boolean
            read:
              default: false
              type: boolean
          type: object
        FilesystemPermissions:
          properties:
            read:
              default: []
              items:
                type: string
              type: array
            write:
              default: []
              items:
                type: string
              type: array
          type: object
        NetworkDeclaration:
          description: |-
            A single network access declaration in a package manifest.

            Each entry describes an allowed outbound destination with host, permitted HTTP methods, and a human-readable purpose. The runtime / host policy checker matches outbound requests against declared entries. Packages with no `network` declarations must not make any outbound network requests.
          properties:
            host:
              description: Destination host (e.g. `"api.openai.com"` or `"*.example.org"`).
              type: string
            methods:
              default: []
              description: Permitted HTTP/WebSocket methods (e.g. `["GET", "POST", "WEBSOCKET"]`). Empty means all.
              items:
                type: string
              type: array
            purpose:
              default: null
              description: Human-readable purpose for this network access.
              type:
              - string
              - 'null'
          required:
          - host
          type: object
        NetworkPermissions:
          properties:
            declarations:
              default: []
              description: Structured network declarations (host, methods, purpose).
              items:
                $ref: '#/$defs/NetworkDeclaration'
              type: array
            hosts:
              default: []
              description: Flat host list for backward compatibility. Packages using the structured form should populate `declarations` instead.
              items:
                type: string
              type: array
          type: object
        PackagePermissions:
          properties:
            call:
              default: []
              items:
                type: string
              type: array
          type: object
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        assets:
          allOf:
          - $ref: '#/$defs/AssetPermissions'
          default:
            read: false
            write: false
        capabilities:
          allOf:
          - $ref: '#/$defs/CapabilityPermissions'
          default:
            invoke: []
        events:
          allOf:
          - $ref: '#/$defs/EventPermissions'
          default:
            append: false
            read: false
        filesystem:
          allOf:
          - $ref: '#/$defs/FilesystemPermissions'
          default:
            read: []
            write: []
        network:
          allOf:
          - $ref: '#/$defs/NetworkPermissions'
          default:
            declarations: []
            hosts: []
        packages:
          allOf:
          - $ref: '#/$defs/PackagePermissions'
          default:
            call: []
        secret_refs:
          default: []
          description: |-
            Declared secret references this package may use in `kernel.v1.outbound.execute` calls. Each entry must be a valid env-backed secret reference (e.g. `secret_ref:env:OPENAI_API_KEY`, `secretRef:env:MY_KEY`, `secret-ref:env:NAME`, `host:env:NAME`).

            The runtime enforces fail-closed: any `secret_ref` used in `secret_headers` or top-level `secret_refs` at dispatch time **must** appear in this list, or the request is denied.

            Default: empty vec (no secret refs allowed; backward compatible).
          items:
            type: string
          type: array
      title: PermissionSet
      type: object
    ProtocolContext:
      $defs:
        ProtocolPrincipal:
          oneOf:
          - properties:
              kind:
                enum:
                - host_admin
                type: string
            required:
            - kind
            type: object
          - properties:
              kind:
                enum:
                - host_dev
                type: string
            required:
            - kind
            type: object
          - properties:
              kind:
                enum:
                - package
                type: string
              package_id:
                type: string
            required:
            - kind
            - package_id
            type: object
          - properties:
              kind:
                enum:
                - human
                type: string
              user_id:
                type: string
            required:
            - kind
            - user_id
            type: object
          - properties:
              assistant_id:
                type: string
              delegated_user_id:
                type:
                - string
                - 'null'
              kind:
                enum:
                - assistant
                type: string
            required:
            - assistant_id
            - kind
            type: object
          - properties:
              kind:
                enum:
                - anonymous
                type: string
            required:
            - kind
            type: object
      $schema: https://json-schema.org/draft/2020-12/schema
      properties:
        correlation_id:
          default: null
          format: uuid
          type:
          - string
          - 'null'
        parent_invocation_id:
          default: null
          format: uuid
          type:
          - string
          - 'null'
        principal:
          $ref: '#/$defs/ProtocolPrincipal'
        session_id:
          description: Optional kernel session id this call is operating under. Used by outbound dispatch to scope secret resolution to the session's project.
          type:
          - string
          - 'null'
        transport:
          type: string
      required:
      - principal
      - transport
      title: ProtocolContext
      type: object
info:
  description: Generated from docs/spec/v1/schemas/. JSON-RPC methods are exposed as typed /rpc/{method} operations for code generators.
  title: Yggdrasil Kernel RPC API
  version: 1.0.0
openapi: 3.1.0
paths:
  /rpc/kernel.v1.asset.get:
    post:
      operationId: assetGet
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                id:
                  oneOf:
                  - type: string
                  - type: integer
                  - type: 'null'
                jsonrpc:
                  const: '2.0'
                method:
                  const: kernel.v1.asset.get
                params:
                  $schema: https://json-schema.org/draft/2020-12/schema
                  properties:
                    asset_id:
                      type: string
                  required:
                  - asset_id
                  title: AssetGetParams
                  type: object
              required:
              - jsonrpc
              - id
              - method
              - params
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  error:
                    properties:
                      code:
                        type: integer
                      data: true
                      message:
                        type: string
                    required:
                    - code
                    - message
                    type: object
                  id:
                    oneOf:
                    - type: string
                    - type: integer
                    - type: 'null'
                  jsonrpc:
                    const: '2.0'
                  result:
                    $defs:
                      AssetRecord:
                        properties:
                          created_at:
                            format: date-time
                            type: string
                          hash:
                            type: string
                          id:
                            type: string
                          metadata:
                            default: null
                          mime:
                            type: string
                          origin_package_id:
                            type: string
                          size_bytes:
                            format: uint64
                            minimum: 0.0
                            type: integer
                        required:
                        - created_at
                        - hash
                        - id
                        - mime
                        - origin_package_id
                        - size_bytes
                        type: object
                    $schema: https://json-schema.org/draft/2020-12/schema
                    properties:
                      content:
                        type: string
                      record:
                        $ref: '#/$defs/AssetRecord'
                    required:
                    - content
                    - record
                    title: AssetGetResponse
                    type: object
                required:
                - jsonrpc
                - id
                type: object
          description: JSON-RPC response envelope
      summary: Invoke kernel.v1.asset.get
  /rpc/kernel.v1.asset.list:
    post:
      operationId: assetList
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                id:
                  oneOf:
                  - type: string
                  - type: integer
                  - type: 'null'
                jsonrpc:
                  const: '2.0'
                method:
                  const: kernel.v1.asset.list
                params:
                  $schema: https://json-schema.org/draft/2020-12/schema
                  title: EmptyParams
                  type: object
              required:
              - jsonrpc
              - id
              - method
              - params
              type: object
        required: true
      responses:
