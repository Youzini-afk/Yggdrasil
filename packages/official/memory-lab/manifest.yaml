schema_version: 1
id: official/memory-lab
version: 0.1.0
display_name: Official Memory Lab
description: Package-owned long-term memory and knowledge — memory record, retrieval trace, proposal-gated update, correction, forget/redaction, branch-aware view, and provenance. Deterministic, no-network, no inference. Ordinary package capability with no privileged platform access.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
