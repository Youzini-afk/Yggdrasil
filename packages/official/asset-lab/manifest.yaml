schema_version: 1
id: official/asset-lab
version: 0.1.0
display_name: Official Asset Lab
description: Generic asset inspection and planning helpers for Forge and assistant workflows.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/asset-lab/describe
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/asset-lab/preview
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/asset-lab/diff
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/asset-lab/export
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/asset-lab/import_plan
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/asset-lab/content_address
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/asset-lab/provenance_graph
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/asset-lab/home-card
      slot: home_card
      title: Asset Lab
      description: Inspect, preview, diff, export, and plan imports for opaque assets.
      capability_id: official/asset-lab/describe
    - id: official/asset-lab/forge-panel
      slot: forge_panel
      title: Asset Inspector
      description: Generic Forge panel for protocol-visible asset metadata and previews.
      capability_id: official/asset-lab/preview
    - id: official/asset-lab/asset-editor
      slot: asset_editor
      title: Generic Asset Editor
      description: Thin editor descriptor that produces plans and diffs rather than privileged writes.
      capability_id: official/asset-lab/diff
    - id: official/asset-lab/assistant-action
      slot: assistant_action
      title: Draft Asset Import Plan
      description: Prepare an approval-gated import plan for opaque asset content.
      capability_id: official/asset-lab/import_plan
      approval_policy: user_approval
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
