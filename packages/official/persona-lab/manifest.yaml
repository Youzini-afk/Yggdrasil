schema_version: 1
id: official/persona-lab
version: 0.1.0
display_name: Official Persona Lab
description: Generic persona profile import, normalization, description, fragment rendering, and compatibility diagnostics.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/persona-lab/import_profile
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/persona-lab/normalize_profile
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/persona-lab/describe_profile
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/persona-lab/render_fragment
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/persona-lab/compat_report
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/persona-lab/home-card
      slot: home_card
      title: Persona Lab
      description: Import and normalize persona-like profiles without assuming chat characters.
      capability_id: official/persona-lab/describe_profile
    - id: official/persona-lab/forge-panel
      slot: forge_panel
      title: Persona Profile Inspector
      description: Inspect normalized persona profiles, fragments, provenance, and compatibility diagnostics.
      capability_id: official/persona-lab/describe_profile
    - id: official/persona-lab/asset-editor
      slot: asset_editor
      title: Persona Asset Editor
      description: Draft profile normalization plans and rendered fragments without privileged asset writes.
      capability_id: official/persona-lab/normalize_profile
    - id: official/persona-lab/assistant-action
      slot: assistant_action
      title: Draft Persona Profile Change
      description: Prepare an approval-gated persona profile change proposal.
      capability_id: official/persona-lab/render_fragment
      approval_policy: user_approval
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
