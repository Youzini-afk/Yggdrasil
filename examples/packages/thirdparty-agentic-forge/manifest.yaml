consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: thirdparty/agentic-forge/forge-panel
      slot: forge_panel
      title: Community Agentic Forge Inspector
      description: Inspect package-owned run lifecycle, plan graph, candidates, and proposals from a third-party forge without privileged access.
      capability_id: thirdparty/agentic-forge/describe_contract
    - id: thirdparty/agentic-forge/assistant-action
      slot: assistant_action
      title: Community Agentic Forge Assistant
      description: Draft approval-gated promote proposals from a community-maintained forge fully interchangeable with the official agentic-forge-lab.
      capability_id: thirdparty/agentic-forge/draft_promote_proposal
      approval_policy: fork_then_approve
    - id: thirdparty/agentic-forge/home-card
      slot: home_card
      title: Community Agentic Forge
      description: Launch deterministic agent run plans from a third-party forge without real inference, network, or kernel privilege.
      capability_id: thirdparty/agentic-forge/start_run
