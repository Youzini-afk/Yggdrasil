# UI-Map: Pretext → Yggdrasil Web Shell Text Surface Proof
#
# This file is a ledger, not a build artifact. It maps Pretext API concepts to
# the lightweight adapter/fallback skeleton in clients/web/src/text-layout.

ledger:
  version: "T4-alpha-1"
  status: "optional-pretext-engine-forge-preview"
  kernel_scope: "none"
  package_scope: "none"
  protocol_scope: "none"

api_mappings:
  - pretext_api: "prepare(text, font, options?)"
    adapter_api: "prepareText(text, font, options?)"
    adapter_path: "clients/web/src/text-layout/fallback-engine.ts"
    pretext_bridge: "clients/web/src/text-layout/pretext-bridge.ts → toPretextOptions(), bridgePrepared()"
    pretext_engine: "clients/web/src/text-layout/pretext-engine.ts → PretextTextEngine.prepareText()"
    note: "Opaque handle. FallbackTextEngine uses canvas measureText. PretextTextEngine bridges Pretext's prepare()."

  - pretext_api: "layout(prepared, maxWidth, lineHeight)"
    adapter_api: "layoutPreparedText(prepared, maxWidth, lineHeight)"
    adapter_path: "clients/web/src/text-layout/fallback-engine.ts"
    pretext_bridge: "clients/web/src/text-layout/pretext-bridge.ts → fromPretextLayoutResult(), unbridgePrepared()"
    pretext_engine: "clients/web/src/text-layout/pretext-engine.ts → PretextTextEngine.layoutPreparedText()"
    note: "Resize hot path. FallbackTextEngine does simple word-split arithmetic. PretextTextEngine delegates to Pretext."

  - pretext_api: "prepareWithSegments(text, font, options?)"
    adapter_api: "prepareTextWithSegments(text, font, options?)"
    adapter_path: "clients/web/src/text-layout/fallback-engine.ts"
    pretext_bridge: "clients/web/src/text-layout/pretext-bridge.ts → bridgePreparedWithSegments()"
    pretext_engine: "clients/web/src/text-layout/pretext-engine.ts → PretextTextEngine.prepareTextWithSegments()"
    note: "Rich path for manual line layout. Both engines return segments/widths."

  - pretext_api: "layoutWithLines(prepared, maxWidth, lineHeight)"
    adapter_api: "layoutPreparedTextWithLines(prepared, maxWidth, lineHeight)"
    adapter_path: "clients/web/src/text-layout/fallback-engine.ts"
    pretext_bridge: "clients/web/src/text-layout/pretext-bridge.ts → fromPretextLayoutLinesResult()"
    pretext_engine: "clients/web/src/text-layout/pretext-engine.ts → PretextTextEngine.layoutPreparedTextWithLines()"
    note: "Materializes lines. Bridge synthesizes cursors from Pretext line data."

  - pretext_api: "measureLineStats(prepared, maxWidth)"
    adapter_api: "measureLineStats(prepared, maxWidth)"
    adapter_path: "clients/web/src/text-layout/fallback-engine.ts"
    pretext_bridge: "clients/web/src/text-layout/pretext-bridge.ts → fromPretextLineStats()"
    pretext_engine: "clients/web/src/text-layout/pretext-engine.ts → PretextTextEngine.measureLineStats()"
    note: "Non-allocating stats. Direct type mapping."

  - pretext_api: "walkLineRanges(prepared, maxWidth, onLine)"
    adapter_api: "walkLineRanges(prepared, maxWidth, onLine)"
    adapter_path: "clients/web/src/text-layout/fallback-engine.ts"
    pretext_bridge: "clients/web/src/text-layout/pretext-bridge.ts → fromPretextLineRange()"
    pretext_engine: "clients/web/src/text-layout/pretext-engine.ts → PretextTextEngine.walkLineRanges()"
    note: "Non-materializing walker. Bridge maps PretextLayoutLineRange to Ygg LayoutLineRange."

engine_abstraction:
  - interface: "TextEngine"
    path: "clients/web/src/text-layout/engine.ts"
    note: "Abstract interface for text layout engines. Includes EngineConfig, TextEngineConfig, TextEngineName, TextEngineState, TextEngineDiagnostics."

  - implementation: "FallbackTextEngine"
    path: "clients/web/src/text-layout/fallback-engine.ts"
    note: "Canvas-based fallback. Always available. Bounded cache (4096 entries). Backward-compatible function exports."

  - implementation: "PretextTextEngine (T3)"
    path: "clients/web/src/text-layout/pretext-engine.ts"
    note: "Optional Pretext engine. Loaded via dynamic import with async initialize(). Throws diagnostic error if unavailable. Registry falls back gracefully."

  - bridge: "PretextBridge (T3)"
    path: "clients/web/src/text-layout/pretext-bridge.ts"
    note: "Isolated mapping between Ygg text-layout types and Pretext shapes. Option/result conversion and opaque handle bridging."

  - shim: "PretextShim (T3)"
    path: "clients/web/src/text-layout/pretext-shim.ts"
    note: "Local type definitions mirroring Pretext API (v0.0.7). Allows tsc to compile without the package. Defines PretextModuleShape for safe dynamic import casting."

  - config: "config.ts (T3)"
    path: "clients/web/src/text-layout/config.ts"
    note: "Runtime engine preference resolution. Supports auto/fallback/pretext from URL, localStorage, global env. Default: auto."

  - registry: "registry.ts"
    path: "clients/web/src/text-layout/registry.ts"
    note: "registerTextEngine, activateTextEngine, getActiveTextEngine, selectTextEngine, getTextEngineState, getTextEngineDiagnostics. T3 adds: initializeTextEnginePreference (async), getInitializationResult, isPretextEngineAvailable."

stream_adapter:
  - adapter: "feedStreamFrame"
    path: "clients/web/src/text-layout/stream-adapter.ts"
    note: "Generic frame-to-buffer adapter. Supports start/chunk/progress/end/error/cancelled/timeout. No model/agent semantics."
    frame_kinds:
      - "start"
      - "chunk"
      - "progress"
      - "end"
      - "error"
      - "cancelled"
      - "timeout"

text_preview:
  - helper: "extractEventPreview"
    path: "clients/web/src/text-layout/text-preview.ts"
    note: "Extracts safe plain-text preview from event payloads. Supports kernel/v1/stream.* events and common payload fields (text, message, summary, reason, content). Uses active text engine for line/height estimation."
    supported_kinds:
      - "stream-chunk"
      - "stream-progress"
      - "stream-error"
      - "stream-cancelled"
      - "stream-timeout"
      - "payload-field"

  - helper: "extractProposalPreview"
    path: "clients/web/src/text-layout/text-preview.ts"
    note: "Extracts text preview from proposal expected_effects/operations long string fields. No model/agent semantics."
    supported_kinds:
      - "proposal-effects"
      - "proposal-operations"

  - helper: "kindBadgeLabel"
    path: "clients/web/src/text-layout/text-preview.ts"
    note: "Returns human-readable badge label for a TextPreviewKind."

forge_preview:
  - component: "Forge Event Text Preview"
    location: "Forge Events section"
    path: "clients/web/src/surfaces/forge.ts → renderEvent()"
    purpose: "Optional <details> with preview text, line/height estimate, engine name, and kind badge below existing JSON <code>. Does not replace JSON inspector."
    css_class: "text-preview-details"

  - component: "Forge Proposal Text Preview"
    location: "Forge Proposals section"
    path: "clients/web/src/surfaces/forge.ts → renderProposal()"
    purpose: "Optional <details> with preview text for proposal effects/operations. Does not replace 'Inspect proposal' JSON details."
    css_class: "text-preview-details"

streaming_proof:
  - component: "MockStreamingTextProof"
    location: "Assistant Drawer"
    path: "clients/web/src/drawer/assistant.ts"
    purpose: "Demonstrate progressive text, line/height estimates, stream lifecycle badges, and active engine diagnostics without real model/agent calls."
    redaction_states:
      - "idle"
      - "streaming"
      - "ended"
      - "reset"
    mock_source: "clients/web/src/text-layout/mock.ts"
    engine_diagnostics:
      - "engine name"
      - "engine version"
      - "engine state"
      - "engine preference (T3)"
      - "pretext availability (T3)"
      - "fallback reason (T3)"

font_policy:
  - variable: "--font-text-surface"
    value: "'Inter', 'Helvetica Neue', Arial, sans-serif"
    reason: "Named font avoids system-ui canvas/DOM mismatch on macOS."
  - variable: "--font-text-surface-mono"
    value: "'SF Mono', 'Fira Code', monospace"
    reason: "Monospace for diagnostics and stream metadata badges."

constraints:
  - "No Pretext dependency in clients/web/package.json."
  - "Adapter must compile and run without Pretext installed."
  - "Pretext is loaded via dynamic import; compilation does not require the package."
  - "PretextTextEngine.initialize() throws diagnostic error if module unavailable; registry falls back to FallbackTextEngine."
  - "Engine preference supports auto/fallback/pretext (URL, localStorage, global env)."
  - "Default is auto: use Pretext if available, otherwise fallback."
  - "Proof stays inside Assistant Drawer; does not rewrite Play/Forge surfaces (T4 adds optional preview layers without replacing JSON inspectors)."
  - "FallbackTextEngine cache is bounded (default 4096 entries, FIFO eviction)."
  - "Stream adapter has no model/agent coupling."
  - "Text preview helper (T4) has no model/agent coupling — pure payload field extraction."
  - "Forge text preview (T4) is additive: original JSON inspectors always preserved."
