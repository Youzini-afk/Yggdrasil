title: Yggdrasil Forge Host With Live Model Outbound Enabled (Example)

# Live HTTP outbound for model API calls is opt-in. This example is not the
# default profile. It enables HTTPS outbound execute for provider API calls.
# Do not use this directly — copy and edit allowed_hosts to match your
# provider needs.
# Set environment variables for any API keys referenced via secret_ref:env:NAME
# (e.g., OPENAI_API_KEY, DEEPSEEK_API_KEY, ANTHROPIC_API_KEY,
# GEMINI_API_KEY, OPENROUTER_API_KEY, XAI_API_KEY, FIREWORKS_API_KEY).
# Real live smoke tests stay disabled unless YGG_LIVE_MODEL_TESTS=1 is also set.
#
# The live executor is HTTPS-only, does not follow redirects, and never echoes
# raw auth/body content in audit or response shapes. Secret headers are
# injected from host-resolved secret_refs at execution time only.

outbound:
  git:
    enabled: false
    executor: deny_all
    allowed_hosts: []
  execute:
    enabled: true
    executor: live
    allowed_hosts:
      - api.openai.com
      - api.deepseek.com
      - api.anthropic.com
      - openrouter.ai
      - generativelanguage.googleapis.com
      - api.x.ai
      - api.fireworks.ai
    https_only: true
    timeout_ms: 30000
    allow_redirects: false
    allow_insecure_loopback_for_tests: false
  # websocket:
  #   enabled: false
  #   executor: deny_all     # | fake | live
  #   allowed_hosts:
  #     - api.openai.com               # OpenAI Realtime
  #     - generativelanguage.googleapis.com  # Gemini Live
