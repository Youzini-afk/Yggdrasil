name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  gate:
    name: Exact-tag CI gate
    uses: ./.github/workflows/ci.yml
    with:
      release_version: ${{ github.ref_name }}
    permissions:
      contents: read

  build-tauri:
    needs: gate
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            artifact_target: linux-x86_64
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target x86_64-unknown-linux-gnu"
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            artifact_target: macos-aarch64
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target aarch64-apple-darwin"
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            artifact_target: macos-x86_64
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target x86_64-apple-darwin"
          - platform: windows-2022
            rust_target: x86_64-pc-windows-msvc
            artifact_target: windows-x86_64
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Install web deps
        run: npm ci --prefix clients/web

      - name: Install desktop deps
        run: npm ci --prefix clients/desktop

      - name: Build & release
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YGG_DESKTOP_TARGET: ${{ matrix.rust_target }}
        with:
          projectPath: clients/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Yggdrasil ${{ github.ref_name }}"
          releaseBody: |
            ## Yggdrasil ${{ github.ref_name }}

            Source: https://github.com/Youzini-afk/Yggdrasil/tree/${{ github.ref_name }}

            ## License
            AGPL-3.0. See repository LICENSE for terms.

            ## Build
            See BUILDING.md for build instructions.

            ## Changelog
            See CHANGELOG.md.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Stage release assets and checksums
        shell: bash
        run: |
          node scripts/release-metadata.mjs \
            '${{ steps.tauri.outputs.artifactPaths }}' \
            '${{ matrix.artifact_target }}'

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: release-assets
          format: spdx-json
          output-file: release-metadata/Yggdrasil-${{ matrix.artifact_target }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-checksums: release-metadata/Yggdrasil-${{ matrix.artifact_target }}-SHA256SUMS.txt

      - name: Attest release SBOM
        uses: actions/attest@v4
        with:
          subject-checksums: release-metadata/Yggdrasil-${{ matrix.artifact_target }}-SHA256SUMS.txt
          sbom-path: release-metadata/Yggdrasil-${{ matrix.artifact_target }}.spdx.json

      - name: Upload checksums and SBOM to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload '${{ github.ref_name }}' \
            'release-metadata/Yggdrasil-${{ matrix.artifact_target }}-SHA256SUMS.txt' \
            'release-metadata/Yggdrasil-${{ matrix.artifact_target }}.spdx.json' \
            --clobber
