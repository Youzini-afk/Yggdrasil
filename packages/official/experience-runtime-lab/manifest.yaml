schema_version: 1
id: official/experience-runtime-lab
version: 0.1.0
display_name: Official Experience Runtime Lab
description: Package-owned experience runtime contract — experience descriptor, state projection, checkpoint, recovery, and Play/Forge/Assist surface bindings. Deterministic, no-network, no real model inference. Produces contract shapes, checkpoints, recovery plans, and agent-run bindings through ordinary capabilities.
entry:
  kind: rust_inproc
  crate_ref: official-foundation
  symbol: register
  abi_version: 1
provides:
  - id: official/experience-runtime-lab/describe_contract
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/experience-runtime-lab/create_checkpoint
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/experience-runtime-lab/inspect_checkpoint
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/experience-runtime-lab/draft_recovery
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: official/experience-runtime-lab/bind_agent_run
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
  surfaces:
    - id: official/experience-runtime-lab/entry
      slot: experience_entry
      title: Experience Runtime Lab Entry
      description: Launchable experience entry surface for the experience runtime contract.
      capability_id: official/experience-runtime-lab/describe_contract
      activation:
        launch_capability_id: official/experience-runtime-lab/describe_contract
        session_template:
          labels: [experience, runtime, lab]
      approval_policy: user_approval
    - id: official/experience-runtime-lab/play
      slot: play_renderer
      title: Experience Runtime Play Renderer
      description: Play renderer surface for experience state visualization.
      capability_id: official/experience-runtime-lab/describe_contract
    - id: official/experience-runtime-lab/forge
      slot: forge_panel
      title: Experience Runtime Forge Panel
      description: Forge panel for inspecting and modifying experience state, checkpoints, and recovery plans.
      capability_id: official/experience-runtime-lab/describe_contract
    - id: official/experience-runtime-lab/assist
      slot: assistant_action
      title: Experience Runtime Assistant Action
      description: Assistant action for proposal-gated experience modifications via Agentic Forge.
      capability_id: official/experience-runtime-lab/draft_recovery
      approval_policy: fork_then_approve
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
