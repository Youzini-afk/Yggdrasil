    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: thirdparty/agentic-forge/compare_candidate
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
  - id: thirdparty/agentic-forge/draft_promote_proposal
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
