      slot: forge_panel
      title: Schema Tools
      description: Validate and sample schemas from a Forge panel.
      capability_id: official/schema-tools/validate
permissions:
  capabilities:
    invoke: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 5000
  memory_mb: 128
  wall_clock_ms: 30000
