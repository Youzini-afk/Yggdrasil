          - 'null'
        redaction_state:
          allOf:
          - $ref: '#/components/schemas/RedactionState'
          default: not_captured
          description: Redaction state applied to the response.
        status:
          description: 'High-level status: "ok", "error", "denied", "timeout".'
          type: string
        status_code:
          default: null
          description: HTTP-style status code if applicable (e.g. 200, 429, 503).
          format: uint16
          minimum: 0.0
          type:
          - integer
          - 'null'
        usage:
          default: null
          description: 'Usage placeholder (e.g. `{"prompt_tokens": 10, "completion_tokens": 20}`).'
      required:
      - executor_kind
      - network_performed
      - status
      title: OutboundExecutorResponse
      type: object
    OutboundSecretHeaderSpec:
      description: |-
        Specification for a secret-derived HTTP header to be injected by the host during outbound execution. Packages declare these in `kernel.v1.outbound.execute` params as `secret_headers`; the host resolves the `secret_ref` at execution time and injects the resulting header value into the live HTTP request.

        Raw secret values never appear in audit, response, or Debug output.
      properties:
        header_name:
          type: string
        scheme:
          type: string
        secret_ref:
          type: string
      required:
      - header_name
      - scheme
      - secret_ref
      type: object
    OutboundStaticHeader:
      description: |-
        A safe non-secret static header for outbound requests (L5).

        Only header names on the `STATIC_HEADER_ALLOWLIST` are permitted. Secret-bearing header names (Authorization, x-api-key, Cookie, etc.) are rejected at parse time. Values must be plain strings that do not look like raw secrets.
