schema_version: 1
id: example/echo-wasm
version: 0.1.0
display_name: Echo WASM Preview Example
description: Manifest-only preview for the WASM entry form.
entry:
  kind: wasm
  module: echo_wasm_preview.wasm
  abi_version: 1
  memory_limit_mb: 32
provides:
  - id: example/echo-wasm/echo
    version: 0.1.0
    input_schema: {}
    output_schema: {}
    streaming: false
    side_effects: []
consumes: []
contributes:
  schemas: []
  hooks: []
  extension_points: []
permissions:
  events:
    read: false
    append: false
  capabilities:
    invoke: []
  packages:
    call: []
  assets:
    read: false
    write: false
  network:
    hosts: []
  filesystem:
    read: []
    write: []
sandbox_policy:
  cpu_quota_ms_per_invoke: 1000
  memory_mb: 32
  wall_clock_ms: 5000
