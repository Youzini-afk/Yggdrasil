name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target x86_64-unknown-linux-gnu"
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target aarch64-apple-darwin"
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target x86_64-apple-darwin"
          - platform: windows-2022
            rust_target: x86_64-pc-windows-msvc
            tauri_args: "--config src-tauri/tauri.sidecar.conf.json --target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Install web deps
        run: npm ci --prefix clients/web

      - name: Install desktop deps
        run: npm ci --prefix clients/desktop

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YGG_DESKTOP_TARGET: ${{ matrix.rust_target }}
        with:
          projectPath: clients/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Yggdrasil ${{ github.ref_name }}"
          releaseBody: |
            ## Yggdrasil ${{ github.ref_name }}

            Source: https://github.com/Youzini-afk/Yggdrasil/tree/${{ github.ref_name }}

            ## License
            AGPL-3.0. See repository LICENSE for terms.

            ## Build
            See BUILDING.md for build instructions.

            ## Changelog
            See CHANGELOG.md.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}
